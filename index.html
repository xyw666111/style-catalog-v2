<html lang="zh-CN">
<head>

  <title>球衣款式图册</title>
  <style>
    :root{--bg:#fbfaf7;--card:#fff;--ink:#171717;--muted:#7a746b;--line:#e7e0d6;--soft:#f3efe7;--accent:#8a4a35;--shadow:0 8px 24px rgba(30,26,22,.045)}
    *{box-sizing:border-box}html,body{width:100%;max-width:100%;overflow-x:hidden}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;letter-spacing:.01em}button,input{font-family:inherit;color:inherit}button{cursor:pointer}img{max-width:100%;display:block}
    .page{max-width:1220px;margin:0 auto;padding:22px 18px 80px}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid rgba(231,224,214,.82);background:rgba(251,250,247,.94);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}.mark{width:38px;height:32px;border:1px solid #25231f;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:800;letter-spacing:-.03em;flex:none}.brand-text{min-width:0}.brand h1{margin:0;font-size:18px;line-height:1.1;font-weight:840;letter-spacing:-.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand p{margin:3px 0 0;font-size:12px;line-height:1.1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.searchbox{height:36px;width:42px;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:#fff;box-shadow:0 5px 16px rgba(30,26,22,.035);transition:width .18s ease,padding .18s ease}.searchbox span{font-size:15px;color:#4c4741}.searchbox input{width:0;opacity:0;border:0;outline:0;background:transparent;font-size:13px;transition:width .18s ease,opacity .12s ease}.searchbox:focus-within{width:152px;padding:0 10px;justify-content:flex-start}.searchbox:focus-within input{width:100%;opacity:1}.home-btn{display:none;height:34px;padding:0 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:12px;font-weight:760}.promo{margin:12px 0 17px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.82);font-size:12.5px;line-height:1.55;color:#5e574e}.notice{margin:12px 0;padding:14px 16px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--muted);font-size:13px;line-height:1.7}.resultbar{display:none;margin:0 0 12px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--muted);font-size:13px;line-height:1.5}.resultbar.show{display:flex;align-items:center;justify-content:space-between;gap:10px}.resultbar button{border:1px solid var(--ink);border-radius:999px;background:#fff;padding:7px 10px;font-weight:760;white-space:nowrap}
    .catalog-sections{display:flex;flex-direction:column;gap:22px}.collection{padding-top:17px;border-top:1px solid var(--line)}.collection:first-child{padding-top:0;border-top:0}.collection-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px}.collection-head h3{margin:0;display:flex;align-items:center;gap:7px;font-size:20px;line-height:1.1;font-weight:850;letter-spacing:-.04em}.collection-head h3:before{content:"";width:4px;height:17px;border-radius:999px;background:#24221f;display:block;flex:none}.section-link{height:32px;padding:0 13px;border:1px solid #171717;border-radius:999px;background:#171717;color:#fff;font-size:12px;font-weight:800;white-space:nowrap}.grid,.collection-grid,.section-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:2px}.card{overflow:hidden;border:1px solid #eee7dd;border-radius:14px;background:#fff;box-shadow:0 4px 12px rgba(35,32,28,.03)}.media{position:relative;overflow:hidden;aspect-ratio:3/4;background:var(--soft)}.media img{width:100%;height:100%;object-fit:cover;object-position:var(--pos,center center)}.placeholder{height:100%;display:grid;place-items:center;color:var(--muted);font-size:12px;background:linear-gradient(180deg,#fbfaf7,#f5f0e8)}.body{padding:8px 8px 9px}.meta{margin-bottom:5px;color:#918a80;font-size:9.5px;letter-spacing:.045em}.title{margin:0 0 5px;font-size:15px;line-height:1.22;min-height:36px;font-weight:820;letter-spacing:-.035em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.price{margin:0;color:var(--accent);font-size:17px;line-height:1.1;font-weight:850}.specs,.actions{display:none}
    .modal{position:fixed;inset:0;display:none;z-index:50;background:rgba(0,0,0,.45);overflow:auto}.modal.open{display:block}.modal-panel{width:100vw;min-height:100vh;background:#fff;overflow:hidden}.modal-media{background:var(--soft);padding:12px 10px 10px}.main-img-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:100%;min-height:auto;border:1px solid #e5ded4;border-radius:18px;background:#fbfaf7;overflow:hidden}.main-img-wrap img{width:100%;height:auto;max-height:72vh;object-fit:contain;object-position:center center;cursor:zoom-in}.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:64px;border:1px solid rgba(255,255,255,.9);border-radius:999px;background:rgba(255,255,255,.84);font-size:30px;line-height:1;display:grid;place-items:center;box-shadow:0 8px 22px rgba(0,0,0,.12)}.gallery-arrow.prev{left:10px}.gallery-arrow.next{right:10px}.thumbs{display:flex;gap:8px;overflow-x:auto;padding:10px 0 0}.thumb{width:66px;height:66px;padding:1px;border:1px solid #e8e0d6;border-radius:12px;background:#fff;overflow:hidden;flex:none}.thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}.thumb.active{border-color:#2a2927;box-shadow:0 0 0 2px rgba(42,41,39,.12)}.modal-info{position:relative;padding:20px 15px 32px;background:#fff}.close{position:absolute;right:14px;top:14px;width:38px;height:38px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:20px}.back-link{border:0;background:transparent;padding:0 0 12px;color:var(--muted);font-size:13px;font-weight:760}.modal-info .code{margin-bottom:12px;color:var(--muted);font-size:11px;letter-spacing:.1em}.modal-info h3{margin:0 48px 8px 0;font-size:25px;line-height:1.12;letter-spacing:-.05em}.modal-info .price{margin:0 0 14px;font-size:24px;color:var(--accent)}.desc{margin:12px 0 18px;color:var(--muted);font-size:13px;line-height:1.65}.details{border-top:1px solid var(--line);margin-bottom:22px}.detail-row{display:grid;grid-template-columns:78px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);font-size:13px}.detail-row span{color:var(--muted)}.detail-row b{text-align:right}.modal-actions{display:grid;grid-template-columns:1fr;gap:9px}.btn{border:1px solid var(--ink);border-radius:16px;background:#fff;padding:12px 10px;font-size:14px;font-weight:760}.btn.primary{background:#171717;color:#fff;padding:13px 10px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:80;display:none;border-radius:999px;background:#111;color:#fff;padding:12px 16px;font-size:14px}.toast.show{display:block}.lightbox{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.86);padding:8px}.lightbox.open{display:flex}.lightbox img{max-width:100vw;max-height:86vh;object-fit:contain;border-radius:10px;background:#fff}.lightbox-close{position:fixed;right:12px;top:12px;width:44px;height:44px;border:1px solid rgba(255,255,255,.35);border-radius:999px;background:rgba(255,255,255,.12);color:#fff;font-size:28px}.lightbox-arrow{position:fixed;top:50%;transform:translateY(-50%);width:42px;height:64px;border:1px solid rgba(255,255,255,.45);border-radius:999px;background:rgba(255,255,255,.13);color:#fff;font-size:34px;display:grid;place-items:center}.lightbox-arrow.prev{left:10px}.lightbox-arrow.next{right:10px}.lightbox-tip{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);color:rgba(255,255,255,.72);font-size:13px;white-space:nowrap}
    body.section-mode .searchbox{display:none}body.section-mode .home-btn{display:flex}.section-mode .resultbar{display:none!important}.section-grid{width:100%;max-width:100%;overflow-x:hidden}
    @media(max-width:620px){.page{padding:12px 5px 56px}}
    @media(min-width:760px){.page{padding:24px 20px 86px}.searchbox{width:min(360px,34vw);padding:0 15px;justify-content:flex-start}.searchbox input{width:100%;opacity:1}.promo{font-size:13px}.catalog-sections{gap:42px}.collection-grid,.grid,.section-grid{grid-template-columns:repeat(3,1fr);gap:18px}.media{height:386px;aspect-ratio:auto}.body{padding:18px}.meta{font-size:12px;margin-bottom:14px}.title{font-size:22px;min-height:auto;margin-bottom:10px}.price{font-size:22px}.modal{padding:28px}.modal-panel{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:.95fr 1.05fr;min-height:720px;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.25)}.modal-media{padding:28px}.main-img-wrap{min-height:570px}.main-img-wrap img{max-height:570px}.modal-info{padding:44px 42px}.modal-info h3{font-size:42px}.details{margin-bottom:28px}.modal-actions{grid-template-columns:1fr 1fr 1fr}.lightbox{padding:24px}.lightbox img{max-width:96vw;max-height:90vh;border-radius:18px}}
  </style>
</head>
<body>
  <main class="app" id="app"><div class="page"><header class="topbar"><div class="brand"><div class="mark">Eva</div><div class="brand-text"><h1>球衣款式图册</h1><p>上新 / 常规 / 清仓款式预览</p></div></div><label class="searchbox"><span>⌕</span><input id="searchInput" placeholder="搜索" /></label><button class="home-btn" id="topHomeBtn">返回首页</button></header><div class="promo">多件优惠：任选 2 件 8 折，3 件 7 折；批发款式可详聊。</div><div class="resultbar" id="resultbar"></div><section class="grid" id="grid"></section></div></main>
  <section class="modal" id="modal"><div class="modal-panel"><div class="modal-media"><div class="main-img-wrap" id="mainImgWrap"></div><div class="thumbs" id="thumbs"></div></div><div class="modal-info"><button class="close" id="closeBtn">×</button><button class="back-link" id="modalBackBtn">← 关闭详情</button><div class="code" id="modalCode"></div><h3 id="modalTitle"></h3><div class="price" id="modalPrice"></div><p class="desc" id="modalDesc"></p><div class="details" id="details"></div><div class="modal-actions"><button class="btn primary" id="copyConfirm">复制款式信息</button><button class="btn" id="copyCodeBtn">复制编号</button><button class="btn" id="continueBtn">继续浏览</button></div></div></div></section>
  <section class="lightbox" id="lightbox"><button class="lightbox-close" id="lightboxClose">×</button><button class="lightbox-arrow prev" id="lightboxPrev">‹</button><img id="lightboxImg" alt="放大图片"><button class="lightbox-arrow next" id="lightboxNext">›</button><div class="lightbox-tip">点击空白处关闭 · 左右切换图片</div></section><div class="toast" id="toast">已复制</div>
  <script>
    let products=[];let currentSection=null;let currentProduct=null;let currentImages=[];let currentThumbs=[];let currentImageIndex=0;
    const THUMB_VER='thumb800-q82-0620';const imagePromises=new Map();let idleTimer=null;
    const $=id=>document.getElementById(id);const sectionOrder=['新品上新','常规款式','清仓打折'];
    history.replaceState({view:'home'},'',location.href);
    function uniqueUrls(urls){return [...new Set((urls||[]).filter(Boolean))]}
    function withVer(src,ver){if(!src||/^data:|^blob:/i.test(src))return src;return src+(src.includes('?')?'&':'?')+'v='+ver}
    function normalizeImageValue(value){if(!value)return '';if(typeof value==='string')return value;return value.image||value.src||value.url||''}
    function isThumbUrl(src){return /-thumb\.jpe?g($|[?#])/i.test(String(src||''))}
    function toThumbUrl(src){src=String(src||'');if(!src||isThumbUrl(src))return src;return src.replace(/\.jpe?g($|[?#])/i,'-thumb.jpg$1')}
    function toOriginalUrl(src){return String(src||'').replace(/-thumb\.jpe?g($|[?#])/i,'.jpg$1')}
    function thumbSrc(src){return withVer(toThumbUrl(src),THUMB_VER)}
    function loadImage(src,priority='auto'){if(!src)return Promise.resolve(false);if(imagePromises.has(src))return imagePromises.get(src);const p=new Promise(resolve=>{const img=new Image();img.decoding='async';if('fetchPriority'in img)img.fetchPriority=priority;img.onload=()=>resolve(true);img.onerror=()=>resolve(false);img.src=src});imagePromises.set(src,p);return p}
    function queueImages(urls,concurrency=2,priority='auto'){const q=uniqueUrls(urls);let i=0;function next(){if(i>=q.length)return;const src=q[i++];loadImage(src,priority).finally(next)}for(let n=0;n<Math.min(concurrency,q.length);n++)next()}
    function idlePreload(urls){clearTimeout(idleTimer);idleTimer=setTimeout(()=>queueImages(urls,2,'low'),700)}
    function warmProduct(p){if(!p)return;const thumbs=uniqueUrls([p.coverThumb,...(p.thumbs||[]).slice(0,3)]).map(thumbSrc);queueImages(thumbs,3,'high')}
    function loadProductImages(code){warmProduct(products.find(x=>x.code===code))}
    function normalizeProduct(p){const raw=(p.images||[]).map(normalizeImageValue).filter(Boolean);const thumbMap={};raw.filter(isThumbUrl).forEach(t=>{thumbMap[toOriginalUrl(t)]=t});const originals=raw.filter(src=>!isThumbUrl(src));const rawCover=normalizeImageValue(p.cover);const cover=(rawCover&&!isThumbUrl(rawCover)?rawCover:'')||originals[0]||toOriginalUrl(raw[0]||'');const images=originals.length?originals:(cover?[cover]:[]);const thumbs=images.map(src=>thumbMap[src]||toThumbUrl(src));const coverThumb=normalizeImageValue(p.cover_thumb)||normalizeImageValue(p.thumb)||thumbMap[cover]||toThumbUrl(cover);return{...p,cover,coverThumb,images,thumbs,category:p.category||'短袖',section:p.section||'常规款式',price:p.price||'¥129',size:p.size||'S / M / L / XL / 2XL / 3XL',condition:p.condition||p.material||'聚酯纤维速干运动面料',imagePosition:p.imagePosition||'center center'}}
    async function loadProducts(){try{const res=await fetch('/api/products',{cache:'no-store'});if(!res.ok)throw new Error('load failed');const data=await res.json();products=(data.products||data||[]).map(normalizeProduct);renderGrid();requestAnimationFrame(()=>idlePreload([...document.querySelectorAll('.card img')].map(img=>img.src)))}catch(e){$('grid').innerHTML='<div class="notice">款式数据暂时加载失败，请稍后再试。</div>'}}
    function matches(p,q){return[p.code,p.style,p.color,p.size,p.price,p.condition,p.category,p.section,p.note].join(' ').toLowerCase().includes(q.toLowerCase())}
    function filteredProducts(){const q=$('searchInput').value.trim();return products.filter(p=>(!currentSection||p.section===currentSection)&&(!q||matches(p,q)))}
    function syncViewMode(){const q=$('searchInput').value.trim();document.body.classList.toggle('section-mode',!!currentSection&&!q)}
    function updateResultbar(list){syncViewMode();const q=$('searchInput').value.trim();if(!q){$('resultbar').classList.remove('show');$('resultbar').innerHTML='';return}$('resultbar').innerHTML=`<span>搜索“${esc(q)}” · 共 ${list.length} 款</span><button id="resetViewBtn">返回首页</button>`;$('resultbar').classList.add('show');$('resetViewBtn').onclick=()=>goHome(true)}
    function productCard(p,priority='auto'){const src=thumbSrc(p.coverThumb||p.cover);return `<article class="card" data-code="${escAttr(p.code)}"><div class="media" style="--pos:${escAttr(p.imagePosition)}">${p.cover?`<img loading="eager" fetchpriority="${priority}" decoding="async" src="${escAttr(src)}" data-fallback="${escAttr(p.cover)}" alt="${escAttr(p.style)}">`:`<div class="placeholder">待上传图片</div>`}</div><div class="body"><div class="meta">${esc(p.code)}</div><h3 class="title">${esc(p.style)}</h3><div class="price">${esc(p.price)}</div></div></article>`}
    function collectionBlock(title,list){const preview=list.slice(0,title==='新品上新'?4:6);return `<section class="collection ${title==='新品上新'?'new-section':''}"><div class="collection-head"><h3>${title}</h3><button class="section-link" data-section="${escAttr(title)}">查看更多</button></div><div class="collection-grid">${preview.map((p,i)=>productCard(p,i<4?'high':'auto')).join('')}</div></section>`}
    function renderGrid(){const list=filteredProducts();updateResultbar(list);const q=$('searchInput').value.trim();if(!list.length){$('grid').className='grid';$('grid').innerHTML='<div class="notice">没有找到匹配款式。</div>';return}if(currentSection&&!q){$('grid').className='section-grid';$('grid').innerHTML=list.map((p,i)=>productCard(p,i<8?'high':'auto')).join('');return}if(!q&&!currentSection){$('grid').className='catalog-sections';$('grid').innerHTML=sectionOrder.map(s=>{const arr=list.filter(p=>p.section===s);return arr.length?collectionBlock(s,arr):''}).join('');return}$('grid').className='grid';$('grid').innerHTML=list.map((p,i)=>productCard(p,i<8?'high':'auto')).join('')}
    function openSection(section,push){currentSection=section;$('searchInput').value='';renderGrid();requestAnimationFrame(()=>idlePreload([...document.querySelectorAll('.card img')].map(img=>img.src)));window.scrollTo({top:0,behavior:'smooth'});if(push)history.pushState({view:'section',section},'',`#section-${encodeURIComponent(section)}`)}window.openSection=openSection;window.loadProductImages=loadProductImages;
    function goHome(push){currentSection=null;closeModal(false);closeLightbox(false);$('searchInput').value='';renderGrid();requestAnimationFrame(()=>idlePreload([...document.querySelectorAll('.card img')].map(img=>img.src)));window.scrollTo({top:0,behavior:'smooth'});if(push)history.pushState({view:'home'},'',location.pathname+location.search)}window.goHome=goHome;
    function setMainImage(original,preview){const first=preview?thumbSrc(preview):original;const arrows=currentImages.length>1?`<button class="gallery-arrow prev" id="prevImgBtn">‹</button><button class="gallery-arrow next" id="nextImgBtn">›</button>`:'';$('mainImgWrap').innerHTML=(first?`<img src="${escAttr(first)}" data-fallback="${escAttr(original)}" alt="商品图片" decoding="async" fetchpriority="high">`:'<div class="placeholder">待上传图片</div>')+arrows;const img=$('mainImgWrap').querySelector('img');if(img)img.onclick=e=>{e.stopPropagation();openLightbox()};const prevBtn=$('prevImgBtn'),nextBtn=$('nextImgBtn');if(prevBtn)prevBtn.onclick=e=>{e.stopPropagation();switchImage(currentImageIndex-1)};if(nextBtn)nextBtn.onclick=e=>{e.stopPropagation();switchImage(currentImageIndex+1)}}
    function preloadAround(i){if(!currentThumbs.length)return;const urls=[0,1,2,-1].map(n=>thumbSrc(currentThumbs[(i+n+currentThumbs.length)%currentThumbs.length]));queueImages(urls,3,'high')}
    function updateThumbs(){document.querySelectorAll('.thumb').forEach((b,i)=>b.classList.toggle('active',i===currentImageIndex))}
    function switchImage(i){if(!currentImages.length)return;currentImageIndex=(i+currentImages.length)%currentImages.length;setMainImage(currentImages[currentImageIndex],currentThumbs[currentImageIndex]);updateThumbs();preloadAround(currentImageIndex)}
    function openModal(code,push){const p=products.find(x=>x.code===code);if(!p)return;currentProduct=p;currentImages=p.images&&p.images.length?p.images:[p.cover];currentThumbs=p.thumbs&&p.thumbs.length?p.thumbs:currentImages.map(toThumbUrl);currentImageIndex=0;warmProduct(p);preloadAround(0);$('modalCode').textContent=p.code;$('modalTitle').textContent=p.style;$('modalPrice').textContent=p.price;$('modalDesc').textContent=p.note||'暂无备注';const rows=[['价格',p.price],['尺码',p.size],['颜色',p.color],['分区',p.section],['材质',p.condition]];$('details').innerHTML=rows.map(r=>`<div class="detail-row"><span>${esc(r[0])}</span><b>${esc(r[1])}</b></div>`).join('');setMainImage(currentImages[0],currentThumbs[0]);$('thumbs').innerHTML=currentImages.map((src,i)=>`<button class="thumb ${i===0?'active':''}" data-i="${i}"><img src="${escAttr(thumbSrc(currentThumbs[i]||src))}" data-fallback="${escAttr(src)}" alt="图片${i+1}" loading="lazy" fetchpriority="low" decoding="async"></button>`).join('');document.querySelectorAll('.thumb').forEach(btn=>btn.onclick=()=>switchImage(Number(btn.dataset.i)));$('modal').classList.add('open');document.body.style.overflow='hidden';if(push)history.pushState({view:'modal',code,section:currentSection},'',`#product-${encodeURIComponent(code)}`)}window.openModal=openModal;
    function closeModal(useBack=true){if(useBack&&$('modal').classList.contains('open')&&history.state&&history.state.view==='modal'){history.back();return}$('modal').classList.remove('open');document.body.style.overflow=''}
    function openLightbox(){if(!currentImages.length)return;$('lightboxImg').src=currentImages[currentImageIndex];$('lightbox').classList.add('open')}
    function closeLightbox(clear=true){$('lightbox').classList.remove('open');if(clear)$('lightboxImg').removeAttribute('src')}
    function moveLightbox(delta){switchImage(currentImageIndex+delta);$('lightboxImg').src=currentImages[currentImageIndex]}
    function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('已复制'),()=>showToast('复制失败，请手动复制'))}
    function infoText(p,type='确认'){return `【${type}款式】\n编号：${p.code}\n款式：${p.style}\n颜色：${p.color}\n尺码：${p.size}\n价格：${p.price}\n材质：${p.condition}\n备注：${p.note||''}\n请联系店主确认库存。`}
    function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
    document.addEventListener('error',e=>{const img=e.target;if(img&&img.tagName==='IMG'&&img.dataset.fallback&&!img.dataset.usedFallback){img.dataset.usedFallback='1';img.src=img.dataset.fallback}},true);
    $('grid').addEventListener('click',e=>{const sec=e.target.closest('[data-section]');if(sec){openSection(sec.dataset.section,true);return}const card=e.target.closest('.card');if(card)openModal(card.dataset.code,true)});
    $('grid').addEventListener('pointerover',e=>{const card=e.target.closest('.card');if(card)loadProductImages(card.dataset.code)});
    $('grid').addEventListener('touchstart',e=>{const card=e.target.closest('.card');if(card)loadProductImages(card.dataset.code)},{passive:true});
    window.addEventListener('popstate',e=>{const state=e.state||{view:'home'};closeLightbox(false);if(state.view==='home'){currentSection=null;$('modal').classList.remove('open');document.body.style.overflow='';$('searchInput').value='';renderGrid();window.scrollTo({top:0});return}if(state.view==='section'){currentSection=state.section;$('modal').classList.remove('open');document.body.style.overflow='';$('searchInput').value='';renderGrid();window.scrollTo({top:0});return}if(state.view==='modal'){currentSection=state.section||null;$('searchInput').value='';renderGrid();openModal(state.code,false);return}});
    $('searchInput').addEventListener('input',()=>{currentSection=null;renderGrid()});$('topHomeBtn').onclick=()=>goHome(true);$('closeBtn').onclick=()=>closeModal(true);$('continueBtn').onclick=()=>closeModal(true);$('modalBackBtn').onclick=()=>closeModal(true);$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal(true)});$('copyConfirm').onclick=()=>currentProduct&&copyText(infoText(currentProduct,'确认'));$('copyCodeBtn').onclick=()=>currentProduct&&copyText(currentProduct.code);$('lightboxClose').onclick=()=>closeLightbox();$('lightboxPrev').onclick=e=>{e.stopPropagation();moveLightbox(-1)};$('lightboxNext').onclick=e=>{e.stopPropagation();moveLightbox(1)};$('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox()});document.addEventListener('keydown',e=>{if($('lightbox').classList.contains('open')){if(e.key==='ArrowLeft')moveLightbox(-1);if(e.key==='ArrowRight')moveLightbox(1);if(e.key==='Escape')closeLightbox();return}if($('modal').classList.contains('open')){if(e.key==='ArrowLeft')switchImage(currentImageIndex-1);if(e.key==='ArrowRight')switchImage(currentImageIndex+1);if(e.key==='Escape')closeModal(true)}});
    loadProducts();
  </script>
</body>
</html>

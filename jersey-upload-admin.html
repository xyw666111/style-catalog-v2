<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>球衣图片上架后台</title>
<style>
:root{--bg:#fbfaf7;--card:#fff;--line:#e8e1d6;--text:#171717;--muted:#777;--soft:#f4f1eb;--black:#111;--green:#067a36;--red:#a33a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.wrap{max-width:980px;margin:0 auto;padding:18px}h1{font-size:24px;margin:0}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin:14px 0}.card h2{font-size:17px;margin:0 0 14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.field{margin:8px 0}.field label{display:block;font-size:13px;color:#5f5a52;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font:inherit;outline:none}.field textarea{min-height:74px;resize:vertical}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:0;border-radius:999px;background:var(--black);color:#fff;padding:12px 17px;font-weight:700;font:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn.ghost{background:var(--soft);color:#111}.btn:disabled{opacity:.45;cursor:not-allowed}.small{font-size:12px;color:var(--muted);line-height:1.7;word-break:break-all}.ok{color:var(--green);font-weight:700}.bad{color:var(--red);font-weight:700}.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.img-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.img-card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--soft);display:block}.img-card .meta{padding:10px}.barbox{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;margin:12px 0}.bar{height:100%;width:0;background:#111;transition:.2s}.sticky{position:sticky;bottom:0;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px;margin:14px -18px -18px}.summary{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}@media(max-width:760px){.grid2,.grid3,.image-grid,.summary{grid-template-columns:1fr}.top{display:block}.top .row{margin-top:12px}.wrap{padding:12px}.sticky{margin:14px -12px -12px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>球衣图片上架后台</h1>
    <div class="row"><a class="btn secondary" id="previewBtn" href="front-live.html">预览前台</a></div>
  </div>

  <div class="card">
    <h2>商品信息</h2>
    <div class="field"><label>ADMIN_KEY</label><input id="adminKey" type="password" placeholder="输入后台密钥"></div>
    <div class="grid3">
      <div class="field"><label>分区</label><select id="section"><option value="新品上新">新品上新</option><option value="常规款式">常规款式</option><option value="清仓打折">清仓打折</option></select></div>
      <div class="field"><label>价格</label><select id="price"><option value="¥189">¥189</option><option value="¥129">¥129</option><option value="¥99">¥99</option></select></div>
      <div class="field"><label>商品编号</label><input id="code" placeholder="自动生成，可手动改"></div>
    </div>
    <div class="row"><button class="btn ghost" id="nextCodeBtn" type="button">生成编号</button><span class="small" id="codeStatus"></span></div>
    <div class="grid2">
      <div class="field"><label>款式名称</label><input id="style" placeholder="例如 巴萨复古主场短袖球衣"></div>
      <div class="field"><label>颜色</label><input id="color" placeholder="例如 红蓝 / 黑金 / 蓝白"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>尺码</label><input id="size" value="全尺码"></div>
      <div class="field"><label>材质</label><input id="material" value="聚酯纤维速干运动面料"></div>
    </div>
    <div class="field"><label>备注</label><textarea id="note" placeholder="可不填"></textarea></div>
  </div>

  <div class="card">
    <h2>图片</h2>
    <div class="grid3">
      <div class="field"><label>选择图片</label><input id="files" type="file" accept="image/*" multiple></div>
      <div class="field"><label>最长边</label><select id="maxSide"><option value="900">900</option><option value="1100">1100</option><option value="700">700</option></select></div>
      <div class="field"><label>质量</label><select id="quality"><option value="0.72">0.72</option><option value="0.62">0.62</option><option value="0.82">0.82</option></select></div>
    </div>
    <div class="row"><button class="btn secondary" id="processBtn" type="button">压缩图片</button><span class="small" id="imageStatus">未选择图片</span></div>
    <div class="image-grid" id="imageList"></div>
  </div>

  <div class="card">
    <h2>保存</h2>
    <div class="barbox"><div class="bar" id="bar"></div></div>
    <div class="small" id="saveStatus">等待操作</div>
    <div class="sticky"><div class="summary"><div class="small" id="summaryText">准备好后保存。</div><button class="btn" id="saveBtn" type="button">一键上传并保存</button></div></div>
  </div>

  <div class="card">
    <h2>首页置顶</h2>
    <div class="row"><button class="btn ghost" id="loadPinsBtn" type="button">读取商品</button><button class="btn" id="savePinsBtn" type="button">保存置顶</button><span class="small" id="pinStatus"></span></div>
    <div class="grid3">
      <div class="field"><label>置顶 1</label><select id="pin1"><option value="">不设置</option></select></div>
      <div class="field"><label>置顶 2</label><select id="pin2"><option value="">不设置</option></select></div>
      <div class="field"><label>置顶 3</label><select id="pin3"><option value="">不设置</option></select></div>
    </div>
  </div>
</div>
<script>
const WORKER_API='https://style-catalog-api.893380992.workers.dev';
const FRONT_URL='https://style-catalog-v2.pages.dev/front-live.html';
const $=id=>document.getElementById(id);
let processed=[],autoCode=true,allProducts=[];
$('previewBtn').href=FRONT_URL+'?from=admin&v='+Date.now();
$('section').onchange=()=>{applySection();if(autoCode)fetchNextCode();};
$('adminKey').onchange=()=>{if(autoCode)fetchNextCode();};
$('code').oninput=()=>{autoCode=false;updateSummary();};
['style','color','size','material','note','price'].forEach(id=>$(id).oninput=updateSummary);
$('nextCodeBtn').onclick=()=>{autoCode=true;fetchNextCode(true);};
$('files').onchange=()=>{processed=[];$('imageList').innerHTML='';$('imageStatus').textContent='已选择 '+$('files').files.length+' 张';updateSummary();};
$('processBtn').onclick=processImages;$('saveBtn').onclick=saveProduct;$('loadPinsBtn').onclick=loadProductsForPins;$('savePinsBtn').onclick=savePins;
applySection();updateSummary();
function applySection(){const s=$('section').value;$('price').value=s==='新品上新'?'¥189':s==='清仓打折'?'¥99':'¥129';updateSummary();}
async function fetchNextCode(force=false){const key=$('adminKey').value.trim();if(!key){$('codeStatus').textContent='';return;}$('codeStatus').textContent='生成中...';try{const res=await fetch(WORKER_API+'/api/admin/next-code?section='+encodeURIComponent($('section').value),{headers:{'X-Admin-Key':key},cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));if(force||autoCode||!$('code').value.trim()){$('code').value=data.code;autoCode=true;$('codeStatus').innerHTML='<span class="ok">'+data.code+'</span>';}}catch(e){$('codeStatus').innerHTML='<span class="bad">编号失败：</span>'+esc(e.message||e);}updateSummary();}
async function processImages(){const files=Array.from($('files').files||[]),code=cleanCode($('code').value.trim());if(!code)return alert('请先生成或填写商品编号');if(!files.length)return alert('请先选择图片');if(files.length>6)return alert('最多 6 张图片');$('processBtn').disabled=true;$('imageStatus').textContent='压缩中...';processed=[];$('imageList').innerHTML='';try{const max=Number($('maxSide').value)||900,q=Number($('quality').value)||0.72;for(let i=0;i<files.length;i++){const r=await compressFile(files[i],code+'-'+(i+1)+'.jpg',max,q);processed.push(r);addImageCard(r,i+1);}$('imageStatus').innerHTML='<span class="ok">完成：</span>'+processed.length+' 张';}catch(e){$('imageStatus').innerHTML='<span class="bad">失败：</span>'+esc(e.message||e);}$('processBtn').disabled=false;updateSummary();}
async function saveProduct(){const key=$('adminKey').value.trim(),code=cleanCode($('code').value.trim());const product={id:code,code,style:$('style').value.trim(),section:$('section').value,price:$('price').value,color:$('color').value.trim(),size:$('size').value.trim(),material:$('material').value.trim(),note:$('note').value.trim(),sort_order:Date.now()};if(!key)return alert('请先输入 ADMIN_KEY');if(!product.code)return alert('请填写商品编号');if(!product.style)return alert('请填写款式名称');if(!processed.length)return alert('请先压缩图片');$('saveBtn').disabled=true;setBar(20);$('saveStatus').textContent='上传中...';try{const files=processed.map(r=>({name:r.name,contentBase64:r.base64}));const res=await fetch(WORKER_API+'/api/admin/upload-product',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key},body:JSON.stringify({product,files}),cache:'no-store'});setBar(70);const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));setBar(100);$('saveStatus').innerHTML='<span class="ok">保存成功。</span> 可点击顶部“预览前台”查看。';autoCode=true;}catch(e){setBar(0);$('saveStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e);}$('saveBtn').disabled=false;}
async function loadProductsForPins(){const key=$('adminKey').value.trim();if(!key)return alert('请先输入 ADMIN_KEY');$('pinStatus').textContent='读取中...';try{const res=await fetch(WORKER_API+'/api/products',{cache:'no-store'});const data=await res.json();allProducts=data.products||[];fillPinSelects();$('pinStatus').innerHTML='<span class="ok">已读取 '+allProducts.length+' 件商品</span>';}catch(e){$('pinStatus').innerHTML='<span class="bad">读取失败：</span>'+esc(e.message||e);}}
function fillPinSelects(){const opts='<option value="">不设置</option>'+allProducts.map(p=>`<option value="${escAttr(p.code)}">${esc(p.code)}｜${esc(p.style||'未命名')}</option>`).join('');['pin1','pin2','pin3'].forEach(id=>$(id).innerHTML=opts);const top=allProducts.filter(p=>Number(p.sort_order)<=3).sort((a,b)=>Number(a.sort_order)-Number(b.sort_order));if(top[0])$('pin1').value=top[0].code;if(top[1])$('pin2').value=top[1].code;if(top[2])$('pin3').value=top[2].code;}
async function savePins(){const key=$('adminKey').value.trim();if(!key)return alert('请先输入 ADMIN_KEY');if(!allProducts.length)await loadProductsForPins();if(!allProducts.length)return;const pins=[$('pin1').value,$('pin2').value,$('pin3').value].filter(Boolean);if(new Set(pins).size!==pins.length)return alert('置顶商品不能重复');$('pinStatus').textContent='保存中...';try{const pinSet=new Set(pins);let n=1000;const products=allProducts.map(p=>({...p,sort_order:pinSet.has(p.code)?pins.indexOf(p.code)+1:n++}));const res=await fetch(WORKER_API+'/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key},body:JSON.stringify({products}),cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));$('pinStatus').innerHTML='<span class="ok">置顶已保存。</span>';allProducts=products.sort((a,b)=>Number(a.sort_order)-Number(b.sort_order));}catch(e){$('pinStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e);}}
async function compressFile(file,name,maxSide,quality){const src=await readFile(file),img=await loadImage(src),scale=Math.min(1,maxSide/Math.max(img.width,img.height)),w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',quality));const dataUrl=await blobToDataUrl(blob);return{name,url:URL.createObjectURL(blob),base64:dataUrl.split(',')[1],before:file.size,after:blob.size,w,h};}
function addImageCard(r,i){const d=document.createElement('div');d.className='img-card';d.innerHTML='<img src="'+r.url+'"><div class="meta"><b>'+i+'. '+esc(r.name)+'</b><div class="small">'+formatSize(r.before)+' → '+formatSize(r.after)+'</div></div>';$('imageList').appendChild(d);}
function updateSummary(){$('summaryText').textContent=($('code').value.trim()||'未生成编号')+'｜'+$('section').value+'｜'+$('price').value+'｜图片 '+processed.length+' 张';}
function setBar(n){$('bar').style.width=Math.max(0,Math.min(100,n))+'%';}
function cleanCode(s){return String(s||'').trim().replace(/\s+/g,'-').replace(/[^A-Za-z0-9_-]/g,'').replace(/-+/g,'-');}
function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src;});}
function blobToDataUrl(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});}
function formatSize(n){return n<1024?n+' B':n<1048576?Math.round(n/1024)+' KB':(n/1048576).toFixed(2)+' MB';}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escAttr(s){return esc(s).replace(/`/g,'&#96;');}
</script>
</body>
</html>

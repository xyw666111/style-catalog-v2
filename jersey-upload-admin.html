<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>球衣图片上架后台</title>
<style>
:root{--bg:#fbfaf7;--card:#fff;--line:#e8e1d6;--text:#171717;--muted:#777;--soft:#f4f1eb;--black:#111;--green:#067a36;--red:#a33a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.wrap{max-width:1060px;margin:0 auto;padding:18px}h1{font-size:24px;margin:0}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin:14px 0}.card h2{font-size:17px;margin:0 0 14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.field{margin:8px 0}.field label{display:block;font-size:13px;color:#5f5a52;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font:inherit;outline:none}.field textarea{min-height:74px;resize:vertical}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:0;border-radius:999px;background:var(--black);color:#fff;padding:11px 15px;font-weight:700;font:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn.ghost{background:var(--soft);color:#111}.btn.danger{background:#fff;color:var(--red);border:1px solid #d8b5ad}.btn:disabled{opacity:.45;cursor:not-allowed}.small{font-size:12px;color:var(--muted);line-height:1.7;word-break:break-all}.ok{color:var(--green);font-weight:700}.bad{color:var(--red);font-weight:700}.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.img-card{position:relative;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;cursor:grab}.img-card.dragging{opacity:.45}.img-card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--soft);display:block}.img-card .meta{padding:10px}.img-delete{position:absolute;top:8px;right:8px;width:30px;height:30px;border:0;border-radius:999px;background:rgba(17,17,17,.78);color:#fff;font-size:20px;line-height:1;cursor:pointer}.preview-mask{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;z-index:99;padding:24px}.preview-mask.open{display:grid;place-items:center}.preview-mask img{max-width:96vw;max-height:92vh;border-radius:16px;background:#fff}.barbox{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;margin:12px 0}.bar{height:100%;width:0;background:#111;transition:.2s}.sticky{position:sticky;bottom:0;background:rgba(251,250,247,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px;margin:14px -18px -18px}.summary{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.manage-toolbar{display:grid;grid-template-columns:1fr 150px auto;gap:10px;margin-bottom:12px}.product-list{display:grid;gap:10px}.product-row{display:grid;grid-template-columns:78px 1fr;gap:12px;align-items:start;border:1px solid var(--line);border-radius:16px;background:#fff;padding:10px}.thumb{width:78px;height:78px;border-radius:12px;object-fit:cover;background:var(--soft);border:1px solid var(--line)}.product-title{font-weight:800;margin-bottom:4px}.tag{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:3px 8px;background:var(--soft);font-size:12px;color:#5f5a52;margin-left:6px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}.actions .btn{padding:8px 10px;font-size:13px}.edit-box{display:none;border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-top:12px}@media(max-width:760px){.grid2,.grid3,.image-grid,.summary,.manage-toolbar{grid-template-columns:1fr}.top{display:block}.top .row{margin-top:12px}.wrap{padding:12px}.sticky{margin:14px -12px -12px}.product-row{grid-template-columns:64px 1fr}.thumb{width:64px;height:64px}.actions .btn{font-size:12px;padding:8px 9px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>球衣图片上架后台</h1><div class="row"><a class="btn secondary" id="previewBtn" href="front-live.html">预览前台</a></div></div>
  <div class="card"><div class="field"><label>ADMIN_KEY</label><input id="adminKey" type="password" placeholder="输入后台密钥"></div></div>

  <div class="card">
    <h2>上架新商品</h2>
    <div class="grid3"><div class="field"><label>分区</label><select id="section"><option value="新品上新">新品上新</option><option value="常规款式">常规款式</option><option value="清仓打折">清仓打折</option></select></div><div class="field"><label>价格</label><select id="price"><option value="¥189">¥189</option><option value="¥129">¥129</option><option value="¥99">¥99</option></select></div><div class="field"><label>商品编号</label><input id="code" placeholder="自动生成，可手动改"></div></div>
    <div class="row"><button class="btn ghost" id="nextCodeBtn" type="button">生成编号</button><span class="small" id="codeStatus"></span></div>
    <div class="grid2"><div class="field"><label>款式名称</label><input id="style" placeholder="例如 巴萨复古主场短袖球衣"></div><div class="field"><label>颜色</label><input id="color" placeholder="例如 红蓝 / 黑金 / 蓝白"></div></div>
    <div class="grid2"><div class="field"><label>尺码</label><input id="size" value="S / M / L / XL / 2XL / 3XL"></div><div class="field"><label>材质</label><input id="material" value="聚酯纤维速干运动面料"></div></div>
    <div class="field"><label>备注</label><textarea id="note" placeholder="可不填"></textarea></div>
    <div class="grid3"><div class="field"><label>选择图片</label><input id="files" type="file" accept="image/*" multiple></div><div class="field"><label>最长边</label><select id="maxSide"><option value="900">900</option><option value="1100">1100</option><option value="700">700</option></select></div><div class="field"><label>质量</label><select id="quality"><option value="0.72">0.72</option><option value="0.62">0.62</option><option value="0.82">0.82</option></select></div></div>
    <div class="row"><button class="btn secondary" id="processBtn" type="button">压缩图片</button><span class="small" id="imageStatus">未选择图片，可分多次选择，最多 9 张；拖动图片排序，双击预览。</span></div>
    <div class="image-grid" id="imageList"></div>
    <div class="barbox"><div class="bar" id="bar"></div></div><div class="small" id="saveStatus">等待操作</div>
    <div class="sticky"><div class="summary"><div class="small" id="summaryText">准备好后保存。</div><button class="btn" id="saveBtn" type="button">一键上传并保存</button></div></div>
  </div>

  <div class="card">
    <h2>管理已上架商品</h2>
    <div class="manage-toolbar"><input id="manageSearch" placeholder="搜索编号 / 款式 / 颜色"><select id="manageSection"><option value="全部">全部分区</option><option value="新品上新">新品上新</option><option value="常规款式">常规款式</option><option value="清仓打折">清仓打折</option></select><button class="btn ghost" id="loadManageBtn" type="button">刷新列表</button></div>
    <div class="small" id="manageStatus">点击“刷新列表”。</div>
    <div class="product-list" id="productList"></div>
    <div class="edit-box" id="editBox"><h2>修改商品</h2><div class="small" id="editCode"></div><div class="grid3"><div class="field"><label>分区</label><select id="editSection"><option value="新品上新">新品上新</option><option value="常规款式">常规款式</option><option value="清仓打折">清仓打折</option></select></div><div class="field"><label>价格</label><select id="editPrice"><option value="¥189">¥189</option><option value="¥129">¥129</option><option value="¥99">¥99</option></select></div><div class="field"><label>颜色</label><input id="editColor"></div></div><div class="grid2"><div class="field"><label>款式名称</label><input id="editStyle"></div><div class="field"><label>尺码</label><input id="editSize"></div></div><div class="field"><label>材质</label><input id="editMaterial"></div><div class="field"><label>备注</label><textarea id="editNote"></textarea></div><div class="row"><button class="btn" id="saveEditBtn" type="button">保存修改</button><button class="btn ghost" id="cancelEditBtn" type="button">取消</button><span class="small" id="editStatus"></span></div></div>
  </div>
</div>
<div class="preview-mask" id="previewMask"><img id="previewImg" alt="图片预览"></div>
<script>
const WORKER_API='https://style-catalog-api.893380992.workers.dev';
const FRONT_URL='https://style-catalog-v2.pages.dev/front-live.html';
const PUBLIC_BASE='https://style-catalog-v2.pages.dev';
const DEFAULT_SIZE='S / M / L / XL / 2XL / 3XL';
const SECTION_ORDER=['新品上新','常规款式','清仓打折'];
const MAX_IMAGES=9;
const $=id=>document.getElementById(id);
let imageItems=[],dragIndex=null,autoCode=true,allProducts=[],editing=null;
$('previewBtn').href=FRONT_URL+'?from=admin&v='+Date.now();
$('section').onchange=()=>{applySection();if(autoCode)fetchNextCode();};
$('adminKey').onchange=()=>{if(autoCode)fetchNextCode();};
$('code').oninput=()=>{autoCode=false;renderImageQueue();updateSummary();};
['style','color','size','material','note','price'].forEach(id=>$(id).oninput=updateSummary);
$('nextCodeBtn').onclick=()=>{autoCode=true;fetchNextCode(true);};
$('files').onchange=appendFiles;
$('processBtn').onclick=processImages;
$('saveBtn').onclick=saveProduct;
$('loadManageBtn').onclick=loadManageProducts;
$('manageSearch').oninput=renderManageProducts;
$('manageSection').onchange=renderManageProducts;
$('cancelEditBtn').onclick=()=>{$('editBox').style.display='none';editing=null;};
$('saveEditBtn').onclick=saveEdit;
$('previewMask').onclick=()=>{$('previewMask').classList.remove('open')};
applySection();
updateSummary();
function key(){return $('adminKey').value.trim()}
function normalizeSize(v){const s=String(v||'').trim();return !s||s==='全尺码'?DEFAULT_SIZE:s}
function normalizeImages(v){if(Array.isArray(v))return v;try{const parsed=JSON.parse(v||'[]');return Array.isArray(parsed)?parsed:[]}catch(e){return[]}}
function sectionIndex(s){const i=SECTION_ORDER.indexOf(s);return i<0?99:i}
function homeRank(p){const n=Number(p.sort_order);return n>=1&&n<=3?n:0}
function productSort(a,b){return sectionIndex(a.section)-sectionIndex(b.section)||homeRank(a)-homeRank(b)||Number(a.sort_order||999999999)-Number(b.sort_order||999999999)||String(a.code||'').localeCompare(String(b.code||''),'zh-CN')}
function applySection(){const s=$('section').value;$('price').value=s==='新品上新'?'¥189':s==='清仓打折'?'¥99':'¥129';updateSummary()}
function incrementCode(code){const m=String(code||'').match(/^(PF-(?:NEW|REG|SALE)-)(\d+)$/i);if(!m)return code;const next=String(Number(m[2])+1).padStart(m[2].length,'0');return m[1].toUpperCase()+next}
async function imageExistsForCode(code){try{const url=PUBLIC_BASE+'/images/products/'+encodeURIComponent(code+'-1.jpg')+'?v='+Date.now();let res=await fetch(url,{method:'HEAD',cache:'no-store'});if(res.ok)return true;if(res.status===405){res=await fetch(url,{cache:'no-store'});return res.ok}return false}catch(e){return false}}
async function nextAvailableCode(startCode){let code=cleanCode(startCode),guard=0;while(code&&guard<80&&await imageExistsForCode(code)){code=incrementCode(code);guard++}return code}
function nextCodeFromConflict(msg){const m=String(msg||'').match(/(PF-(?:NEW|REG|SALE)-\d+)-\d+\.jpg/i);return m?incrementCode(m[1]):''}
async function fetchNextCode(force=false){if(!key()){$('codeStatus').textContent='';return}$('codeStatus').textContent='生成中...';try{const res=await fetch(WORKER_API+'/api/admin/next-code?section='+encodeURIComponent($('section').value),{headers:{'X-Admin-Key':key()},cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));if(force||autoCode||!$('code').value.trim()){const raw=data.code;const available=await nextAvailableCode(raw);$('code').value=available;autoCode=true;$('codeStatus').innerHTML='<span class="ok">'+available+'</span>'+(available!==raw?' <span class="small">已跳过存在图片的编号</span>':'')}}catch(e){$('codeStatus').innerHTML='<span class="bad">编号失败：</span>'+esc(e.message||e)}renderImageQueue();updateSummary()}
function appendFiles(){const files=Array.from($('files').files||[]);$('files').value='';if(!files.length)return;let added=0,skipped=0;for(const file of files){if(imageItems.length>=MAX_IMAGES){skipped++;continue}imageItems.push({id:Date.now()+'_'+Math.random().toString(16).slice(2),file,previewUrl:URL.createObjectURL(file),base64:'',before:file.size,after:0,w:0,h:0});added++}renderImageQueue();$('imageStatus').innerHTML='<span class="ok">已加入 '+added+' 张</span>'+(skipped?'，已超过上限，跳过 '+skipped+' 张':'')+'，当前 '+imageItems.length+'/'+MAX_IMAGES+' 张';updateSummary()}
function finalImageName(i){const code=cleanCode($('code').value.trim())||'未生成编号';return code+'-'+(i+1)+'.jpg'}
function renderImageQueue(){const box=$('imageList');box.innerHTML='';imageItems.forEach((item,i)=>{const d=document.createElement('div');d.className='img-card';d.draggable=true;d.dataset.index=i;d.ondragstart=e=>{dragIndex=i;d.classList.add('dragging');e.dataTransfer.effectAllowed='move'};d.ondragend=()=>{dragIndex=null;d.classList.remove('dragging')};d.ondragover=e=>e.preventDefault();d.ondrop=e=>{e.preventDefault();if(dragIndex===null||dragIndex===i)return;moveTo(dragIndex,i)};const src=item.outUrl||item.previewUrl;d.innerHTML='<button class="img-delete" title="删除" type="button">×</button><img src="'+escAttr(src)+'"><div class="meta"><b>'+(i+1)+'. '+esc(finalImageName(i))+'</b><div class="small">'+(item.base64?formatSize(item.before)+' → '+formatSize(item.after):'待压缩｜拖动排序｜双击预览')+'</div></div>';d.querySelector('.img-delete').onclick=e=>{e.stopPropagation();removeImage(i)};d.ondblclick=e=>{if(e.target.className==='img-delete')return;openPreview(src)};box.appendChild(d)});if(!imageItems.length)$('imageStatus').textContent='未选择图片，可分多次选择，最多 '+MAX_IMAGES+' 张；拖动图片排序，双击预览。'}
function moveTo(from,to){if(from<0||to<0||from>=imageItems.length||to>=imageItems.length)return;const a=imageItems.splice(from,1)[0];imageItems.splice(to,0,a);renderImageQueue();updateSummary()}
function removeImage(i){const a=imageItems.splice(i,1)[0];if(a){try{URL.revokeObjectURL(a.previewUrl);if(a.outUrl)URL.revokeObjectURL(a.outUrl)}catch(e){}}renderImageQueue();$('imageStatus').textContent='当前 '+imageItems.length+'/'+MAX_IMAGES+' 张';updateSummary()}
function openPreview(src){$('previewImg').src=src;$('previewMask').classList.add('open')}
async function processImages(){let code=cleanCode($('code').value.trim());if(!code)return alert('请先生成或填写商品编号');if(!imageItems.length)return alert('请先选择图片');if(imageItems.length>MAX_IMAGES)return alert('最多 '+MAX_IMAGES+' 张图片');$('processBtn').disabled=true;$('imageStatus').textContent='检查编号...';try{const available=await nextAvailableCode(code);if(available!==code){code=available;$('code').value=available;$('imageStatus').innerHTML='<span class="bad">原编号图片已存在，已自动改为 '+esc(available)+'。</span>'}const max=Number($('maxSide').value)||900,q=Number($('quality').value)||0.72;$('imageStatus').textContent='压缩中...';for(let i=0;i<imageItems.length;i++){if(imageItems[i].base64)continue;const r=await compressFile(imageItems[i].file,max,q);imageItems[i]={...imageItems[i],...r}}$('imageStatus').innerHTML='<span class="ok">完成：</span>'+imageItems.length+' 张，可拖动调整顺序'}catch(e){$('imageStatus').innerHTML='<span class="bad">失败：</span>'+esc(e.message||e)}$('processBtn').disabled=false;renderImageQueue();updateSummary()}
async function saveProduct(){const code=cleanCode($('code').value.trim());const product={id:code,code,style:$('style').value.trim(),section:$('section').value,price:$('price').value,color:$('color').value.trim(),size:normalizeSize($('size').value),material:$('material').value.trim(),note:$('note').value.trim(),sort_order:Date.now()};if(!key())return alert('请先输入 ADMIN_KEY');if(!product.code)return alert('请填写商品编号');if(!product.style)return alert('请填写款式名称');if(!imageItems.length)return alert('请先选择图片');if(imageItems.some(x=>!x.base64))return alert('请先压缩图片');$('saveBtn').disabled=true;setBar(20);$('saveStatus').textContent='上传中...';try{const files=imageItems.map((r,i)=>({name:code+'-'+(i+1)+'.jpg',contentBase64:r.base64}));const res=await fetch(WORKER_API+'/api/admin/upload-product',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key()},body:JSON.stringify({product,files}),cache:'no-store'});setBar(70);const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));setBar(100);$('saveStatus').innerHTML='<span class="ok">保存成功。</span>';autoCode=true;loadManageProducts()}catch(e){setBar(0);const msg=e.message||e;const next=nextCodeFromConflict(msg);if(next){$('code').value=next;renderImageQueue();$('imageStatus').textContent='已自动换到 '+next+'，不用重新选图，可直接再保存。';$('saveStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(msg)+' 已自动换到 '+esc(next)+'，请再点一次保存。'}else{$('saveStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(msg)}}$('saveBtn').disabled=false;updateSummary()}
async function loadManageProducts(){ $('manageStatus').textContent='读取中...';try{const res=await fetch(WORKER_API+'/api/products',{cache:'no-store'});const data=await res.json();allProducts=(data.products||[]).map(p=>({...p,images:normalizeImages(p.images),size:normalizeSize(p.size)})).sort(productSort);$('manageStatus').innerHTML='<span class="ok">已读取 '+allProducts.length+' 件商品</span>';renderManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">读取失败：</span>'+esc(e.message||e)}}
function renderManageProducts(){const q=$('manageSearch').value.trim().toLowerCase(),sec=$('manageSection').value;let list=allProducts.filter(p=>(sec==='全部'||p.section===sec)&&(!q||[p.code,p.style,p.color,p.section,p.price,p.note,p.size].join(' ').toLowerCase().includes(q))).sort(productSort);if(!list.length){$('productList').innerHTML='<div class="small">没有商品。</div>';return}$('productList').innerHTML=list.map(p=>{const img=firstImage(p);const rank=homeRank(p);return `<div class="product-row"><img class="thumb" src="${escAttr(img)}"><div><div class="product-title">${esc(p.code)}｜${esc(p.style||'未命名')}${rank?`<span class="tag">本板块置顶 ${rank}</span>`:''}</div><div class="small">${esc(p.section||'')}｜${esc(p.price||'')}｜${esc(p.color||'')}｜${esc(normalizeSize(p.size))}</div><div class="actions"><button class="btn ghost" onclick="setHomeRank('${escAttr(p.code)}',1)">置顶1</button><button class="btn ghost" onclick="setHomeRank('${escAttr(p.code)}',2)">置顶2</button><button class="btn ghost" onclick="setHomeRank('${escAttr(p.code)}',3)">置顶3</button><button class="btn secondary" onclick="clearHomeRank('${escAttr(p.code)}')">取消置顶</button><button class="btn secondary" onclick="startEdit('${escAttr(p.code)}')">编辑</button><button class="btn danger" onclick="deleteProduct('${escAttr(p.id||p.code)}')">删除</button></div></div></div>`}).join('')}
function firstImage(p){const imgs=normalizeImages(p.images);return p.cover||imgs[0]||''}
async function saveAllProducts(message='已保存'){if(!key())return alert('请先输入 ADMIN_KEY');const res=await fetch(WORKER_API+'/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key()},body:JSON.stringify({products:allProducts}),cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));$('manageStatus').innerHTML='<span class="ok">'+message+'</span>'}
async function setHomeRank(code,rank){try{const target=allProducts.find(p=>p.code===code);if(!target)return;let n=Date.now();allProducts=allProducts.map(p=>{if(p.code===code)return{...p,sort_order:rank,size:normalizeSize(p.size)};if(p.section===target.section&&Number(p.sort_order)===rank)return{...p,sort_order:n++,size:normalizeSize(p.size)};return{...p,size:normalizeSize(p.size)}}).sort(productSort);await saveAllProducts('本板块置顶已保存');renderManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e)}}window.setHomeRank=setHomeRank;
async function clearHomeRank(code){try{allProducts=allProducts.map(p=>p.code===code?{...p,sort_order:Date.now(),size:normalizeSize(p.size)}:{...p,size:normalizeSize(p.size)}).sort(productSort);await saveAllProducts('已取消本板块置顶');renderManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e)}}window.clearHomeRank=clearHomeRank;
async function deleteProduct(id){if(!key())return alert('请先输入 ADMIN_KEY');if(!confirm('确认下架这个商品？图片文件会保留。'))return;try{const res=await fetch(WORKER_API+'/api/admin/products/'+encodeURIComponent(id),{method:'DELETE',headers:{'X-Admin-Key':key()},cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));$('manageStatus').innerHTML='<span class="ok">商品已下架。</span>';await loadManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">删除失败：</span>'+esc(e.message||e)}}window.deleteProduct=deleteProduct;
function startEdit(code){editing=allProducts.find(p=>p.code===code);if(!editing)return;$('editBox').style.display='block';$('editCode').textContent=editing.code;$('editSection').value=editing.section||'常规款式';$('editPrice').value=editing.price||'¥129';$('editColor').value=editing.color||'';$('editStyle').value=editing.style||'';$('editSize').value=normalizeSize(editing.size);$('editMaterial').value=editing.material||editing.condition||'聚酯纤维速干运动面料';$('editNote').value=editing.note||'';$('editStatus').textContent='';window.scrollTo({top:$('editBox').offsetTop-20,behavior:'smooth'})}window.startEdit=startEdit;
async function saveEdit(){if(!editing)return;if(!key())return alert('请先输入 ADMIN_KEY');const updated={...editing,style:$('editStyle').value.trim(),section:$('editSection').value,price:$('editPrice').value,color:$('editColor').value.trim(),size:normalizeSize($('editSize').value),material:$('editMaterial').value.trim(),note:$('editNote').value.trim()};try{const res=await fetch(WORKER_API+'/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key()},body:JSON.stringify({product:updated}),cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));$('editStatus').innerHTML='<span class="ok">修改已保存。</span>';$('editBox').style.display='none';editing=null;await loadManageProducts()}catch(e){$('editStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e)}}
async function compressFile(file,maxSide,quality){const src=await readFile(file),img=await loadImage(src),scale=Math.min(1,maxSide/Math.max(img.width,img.height)),w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',quality));const dataUrl=await blobToDataUrl(blob);return{outUrl:URL.createObjectURL(blob),base64:dataUrl.split(',')[1],after:blob.size,w,h}}
function updateSummary(){$('summaryText').textContent=($('code').value.trim()||'未生成编号')+'｜'+$('section').value+'｜'+$('price').value+'｜图片 '+imageItems.length+' 张'}
function setBar(n){$('bar').style.width=Math.max(0,Math.min(100,n))+'%'}
function cleanCode(s){return String(s||'').trim().replace(/\s+/g,'-').replace(/[^A-Za-z0-9_-]/g,'').replace(/-+/g,'-')}
function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src})}
function blobToDataUrl(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b)})}
function formatSize(n){return n<1024?n+' B':n<1048576?Math.round(n/1024)+' KB':(n/1048576).toFixed(2)+' MB'}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
</script>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>球衣图片上架后台</title>
<style>
:root{--bg:#fbfaf7;--card:#fff;--line:#e8e1d6;--text:#171717;--muted:#777;--soft:#f4f1eb;--black:#111;--green:#067a36;--red:#a33a2f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.wrap{max-width:1060px;margin:0 auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}h1{font-size:24px;margin:0}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin:14px 0}.card h2{font-size:17px;margin:0 0 14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.field{margin:8px 0}.field label{display:block;font-size:13px;color:#5f5a52;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font:inherit;outline:none}.field textarea{min-height:74px;resize:vertical}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:0;border-radius:999px;background:var(--black);color:#fff;padding:11px 15px;font-weight:700;font:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn.ghost{background:var(--soft);color:#111}.btn.danger{background:#fff;color:var(--red);border:1px solid #d8b5ad}.btn:disabled{opacity:.45;cursor:not-allowed}.small{font-size:12px;color:var(--muted);line-height:1.7;word-break:break-all}.ok{color:var(--green);font-weight:700}.bad{color:var(--red);font-weight:700}.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.img-card{position:relative;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.img-card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--soft);display:block}.img-card .meta{padding:10px}.img-delete{position:absolute;top:8px;right:8px;width:30px;height:30px;border:0;border-radius:999px;background:rgba(17,17,17,.78);color:#fff;font-size:20px}.barbox{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;margin:12px 0}.bar{height:100%;width:0;background:#111;transition:.2s}.product-list{display:grid;gap:10px}.product-row{display:grid;grid-template-columns:78px 1fr;gap:12px;align-items:start;border:1px solid var(--line);border-radius:16px;background:#fff;padding:10px}.thumb{width:78px;height:78px;border-radius:12px;object-fit:cover;background:var(--soft);border:1px solid var(--line)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}.actions .btn{padding:8px 10px;font-size:13px}@media(max-width:760px){.grid2,.grid3,.image-grid{grid-template-columns:1fr}.top{display:block}.top .row{margin-top:12px}.wrap{padding:12px}.product-row{grid-template-columns:64px 1fr}.thumb{width:64px;height:64px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>球衣图片上架后台</h1><div class="row"><a class="btn secondary" id="previewBtn" href="/">预览前台</a></div></div>
  <div class="card"><div class="field"><label>ADMIN_KEY</label><input id="adminKey" type="password" placeholder="输入后台密钥"></div></div>
  <div class="card"><h2>上架新商品</h2>
    <div class="grid3"><div class="field"><label>分区</label><select id="section"><option>新品上新</option><option>常规款式</option><option>清仓打折</option></select></div><div class="field"><label>价格</label><select id="price"><option>¥189</option><option>¥129</option><option>¥99</option></select></div><div class="field"><label>商品编号</label><input id="code" placeholder="自动生成，可手动改"></div></div>
    <div class="row"><button class="btn ghost" id="nextCodeBtn" type="button">生成编号</button><span class="small" id="codeStatus"></span></div>
    <div class="grid2"><div class="field"><label>款式名称</label><input id="style" placeholder="例如 巴萨复古主场短袖球衣"></div><div class="field"><label>颜色</label><input id="color" placeholder="例如 红蓝 / 黑金 / 蓝白"></div></div>
    <div class="grid2"><div class="field"><label>尺码</label><input id="size" value="S / M / L / XL / 2XL / 3XL"></div><div class="field"><label>材质</label><input id="material" value="聚酯纤维速干运动面料"></div></div>
    <div class="field"><label>备注</label><textarea id="note" placeholder="可不填"></textarea></div>
    <div class="grid3"><div class="field"><label>选择图片</label><input id="files" type="file" accept="image/*" multiple></div><div class="field"><label>原图最长边</label><select id="maxSide"><option value="2200">2200 高清</option><option value="1800">1800</option><option value="2600">2600</option></select></div><div class="field"><label>原图质量</label><select id="quality"><option value="0.9">0.90 高清</option><option value="0.86">0.86</option><option value="0.94">0.94</option></select></div></div>
    <div class="row"><button class="btn secondary" id="processBtn" type="button">生成高清三层图片</button><span class="small" id="imageStatus">thumb 640/q82；medium 1600/q88；original 最高 2200/q90。</span></div>
    <div class="image-grid" id="imageList"></div><div class="barbox"><div class="bar" id="bar"></div></div><div class="small" id="saveStatus">等待操作</div>
    <div class="row"><button class="btn" id="saveBtn" type="button">一键上传并保存</button><span class="small" id="summaryText"></span></div>
  </div>
  <div class="card"><h2>管理已上架商品</h2><div class="row"><input id="manageSearch" placeholder="搜索编号 / 款式 / 颜色"><button class="btn ghost" id="loadManageBtn" type="button">刷新列表</button></div><div class="small" id="manageStatus">点击刷新列表。</div><div class="product-list" id="productList"></div></div>
</div>
<script>
const WORKER_API='https://style-catalog-api.893380992.workers.dev';const FRONT_URL='https://style-catalog-v2.pages.dev/';const PUBLIC_BASE='https://style-catalog-v2.pages.dev';const DEFAULT_SIZE='S / M / L / XL / 2XL / 3XL';const MAX_IMAGES=9;const $=id=>document.getElementById(id);let imageItems=[],allProducts=[];$('previewBtn').href=FRONT_URL+'?from=admin&v='+Date.now();$('section').onchange=applySection;$('nextCodeBtn').onclick=fetchNextCode;$('files').onchange=appendFiles;$('processBtn').onclick=processImages;$('saveBtn').onclick=saveProduct;$('loadManageBtn').onclick=loadManageProducts;$('manageSearch').oninput=renderManageProducts;['code','style','color','size','material','note','price'].forEach(id=>$(id).oninput=updateSummary);applySection();updateSummary();
function key(){return $('adminKey').value.trim()}function normalizeSize(v){const s=String(v||'').trim();return !s||s==='全尺码'?DEFAULT_SIZE:s}function cleanCode(s){return String(s||'').trim().replace(/\s+/g,'-').replace(/[^A-Za-z0-9_-]/g,'').replace(/-+/g,'-')}function sectionPrefix(){return $('section').value==='新品上新'?'NEW':$('section').value==='清仓打折'?'SALE':'REG'}function applySection(){const s=$('section').value;$('price').value=s==='新品上新'?'¥189':s==='清仓打折'?'¥99':'¥129';updateSummary()}function imageUrlsFor(code,i){const base=PUBLIC_BASE+'/images/products/'+code+'-'+(i+1);return{thumb:base+'-thumb.jpg',medium:base+'-medium.jpg',original:base+'.jpg'}}function baseName(i){return (cleanCode($('code').value)||'未生成编号')+'-'+(i+1)}
async function fetchNextCode(){if(!key())return $('codeStatus').textContent='请先输入 ADMIN_KEY';$('codeStatus').textContent='生成中...';try{const res=await fetch(WORKER_API+'/api/admin/next-code?section='+encodeURIComponent($('section').value),{headers:{'X-Admin-Key':key()},cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));$('code').value=cleanCode(data.code||('PF-'+sectionPrefix()+'-'+Date.now().toString().slice(-3)));$('codeStatus').innerHTML='<span class="ok">'+$('code').value+'</span>';renderImageQueue();updateSummary()}catch(e){$('codeStatus').innerHTML='<span class="bad">编号失败：</span>'+esc(e.message||e)}}
function appendFiles(){const files=Array.from($('files').files||[]);$('files').value='';for(const file of files){if(imageItems.length>=MAX_IMAGES)break;imageItems.push({id:Date.now()+'_'+Math.random().toString(16).slice(2),file,previewUrl:URL.createObjectURL(file),variants:null,before:file.size})}renderImageQueue();$('imageStatus').textContent='当前 '+imageItems.length+'/'+MAX_IMAGES+' 张；请生成高清三层图片。';updateSummary()}function renderImageQueue(){const box=$('imageList');box.innerHTML='';imageItems.forEach((item,i)=>{const src=(item.variants&&item.variants.thumb&&item.variants.thumb.outUrl)||item.previewUrl;const meta=item.variants?formatSize(item.before)+' → thumb '+formatSize(item.variants.thumb.size)+' / medium '+formatSize(item.variants.medium.size)+' / original '+formatSize(item.variants.original.size):'待生成高清三层｜'+baseName(i)+'.jpg';const d=document.createElement('div');d.className='img-card';d.innerHTML='<button class="img-delete" type="button">×</button><img src="'+escAttr(src)+'"><div class="meta"><b>'+(i+1)+'. '+esc(baseName(i))+'.jpg</b><div class="small">'+meta+'</div></div>';d.querySelector('.img-delete').onclick=()=>{imageItems.splice(i,1);renderImageQueue();updateSummary()};box.appendChild(d)})}
async function processImages(){let code=cleanCode($('code').value);if(!code)return alert('请先生成或填写商品编号');if(!imageItems.length)return alert('请先选择图片');$('processBtn').disabled=true;$('imageStatus').textContent='生成高清 thumb / medium / original 中...';try{const originalMax=Number($('maxSide').value)||2200,originalQ=Number($('quality').value)||0.9;for(let i=0;i<imageItems.length;i++){if(imageItems[i].variants)continue;const file=imageItems[i].file;const thumb=await compressFile(file,640,0.82);const medium=await compressFile(file,1600,0.88);const original=await compressFile(file,originalMax,originalQ);imageItems[i]={...imageItems[i],variants:{thumb,medium,original}};setBar(Math.round((i+1)/imageItems.length*50))}$('imageStatus').innerHTML='<span class="ok">完成：</span>已生成高清三层图片'}catch(e){$('imageStatus').innerHTML='<span class="bad">失败：</span>'+esc(e.message||e)}$('processBtn').disabled=false;setBar(0);renderImageQueue();updateSummary()}
async function saveProduct(){const code=cleanCode($('code').value);if(!key())return alert('请先输入 ADMIN_KEY');if(!code)return alert('请填写商品编号');if(!$('style').value.trim())return alert('请填写款式名称');if(!imageItems.length)return alert('请先选择图片');if(imageItems.some(x=>!x.variants))return alert('请先生成高清三层图片');const product={id:code,code,style:$('style').value.trim(),section:$('section').value,price:$('price').value,color:$('color').value.trim(),size:normalizeSize($('size').value),material:$('material').value.trim(),note:$('note').value.trim(),sort_order:Date.now()};$('saveBtn').disabled=true;setBar(20);$('saveStatus').textContent='上传中...';try{const gallery=imageItems.map((r,i)=>imageUrlsFor(code,i));product.gallery=gallery;product.cover=gallery[0].original;product.cover_thumb=gallery[0].thumb;product.cover_medium=gallery[0].medium;const files=[];imageItems.forEach((r,i)=>{const base=code+'-'+(i+1);files.push({name:base+'-thumb.jpg',contentBase64:r.variants.thumb.base64});files.push({name:base+'-medium.jpg',contentBase64:r.variants.medium.base64});files.push({name:base+'.jpg',contentBase64:r.variants.original.base64})});const res=await fetch(WORKER_API+'/api/admin/upload-product',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key()},body:JSON.stringify({product,files}),cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));setBar(100);$('saveStatus').innerHTML='<span class="ok">保存成功：已上传高清 thumb / medium / original。</span>';await loadManageProducts()}catch(e){setBar(0);$('saveStatus').innerHTML='<span class="bad">保存失败：</span>'+esc(e.message||e)}$('saveBtn').disabled=false;updateSummary()}
async function loadManageProducts(){$('manageStatus').textContent='读取中...';try{const res=await fetch(WORKER_API+'/api/products',{cache:'no-store'});const data=await res.json();allProducts=(data.products||[]);$('manageStatus').innerHTML='<span class="ok">已读取 '+allProducts.length+' 件商品</span>';renderManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">读取失败：</span>'+esc(e.message||e)}}function renderManageProducts(){const q=$('manageSearch').value.trim().toLowerCase();const list=allProducts.filter(p=>!q||[p.code,p.style,p.color,p.section,p.price,p.note,p.size].join(' ').toLowerCase().includes(q));$('productList').innerHTML=list.map(p=>{const g=(p.gallery&&p.gallery[0])||{};return '<div class="product-row"><img class="thumb" src="'+escAttr(g.thumb||g.medium||g.original||'')+'"><div><b>'+esc(p.code)+'｜'+esc(p.style||'未命名')+'</b><div class="small">'+esc(p.section||'')+'｜'+esc(p.price||'')+'｜'+esc(p.color||'')+'</div><div class="actions"><button class="btn danger" onclick="deleteProduct(\''+escAttr(p.id||p.code)+'\')">删除</button></div></div></div>'}).join('')||'<div class="small">没有商品。</div>'}async function deleteProduct(id){if(!key())return alert('请先输入 ADMIN_KEY');if(!confirm('确认下架这个商品？图片文件会保留。'))return;try{const res=await fetch(WORKER_API+'/api/admin/products/'+encodeURIComponent(id),{method:'DELETE',headers:{'X-Admin-Key':key()},cache:'no-store'});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||('HTTP '+res.status));await loadManageProducts()}catch(e){$('manageStatus').innerHTML='<span class="bad">删除失败：</span>'+esc(e.message||e)}}window.deleteProduct=deleteProduct;
async function compressFile(file,maxSide,quality){const src=await readFile(file),img=await loadImage(src),scale=Math.min(1,maxSide/Math.max(img.width,img.height)),w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',quality));const dataUrl=await blobToDataUrl(blob);return{outUrl:URL.createObjectURL(blob),base64:dataUrl.split(',')[1],size:blob.size,w,h}}function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}function loadImage(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src})}function blobToDataUrl(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b)})}function updateSummary(){$('summaryText').textContent=(cleanCode($('code').value)||'未生成编号')+'｜'+$('section').value+'｜'+$('price').value+'｜图片 '+imageItems.length+' 张'}function setBar(n){$('bar').style.width=Math.max(0,Math.min(100,n))+'%'}function formatSize(n){return n<1024?n+' B':n<1048576?Math.round(n/1024)+' KB':(n/1048576).toFixed(2)+' MB'}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>款式预览小册 · 快速版</title>
  <style>
    :root{--bg:#fbfaf7;--card:#fff;--ink:#171717;--muted:#74706a;--line:#e6e1d8;--soft:#f4f1eb;--radius:22px;--shadow:0 12px 35px rgba(20,20,20,.06)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.page{max-width:1180px;margin:0 auto;padding:22px 18px 70px}.top{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding-bottom:18px}.mark{width:42px;height:42px;border:2px solid #111;border-radius:50%;display:grid;place-items:center;font-weight:800}.brand h1{margin:0;font-size:24px}.brand p{margin:3px 0 0;color:var(--muted)}.search{margin:22px 0;background:#fff;border:1px solid var(--line);border-radius:999px;padding:14px 18px;display:flex;gap:10px}.search input{border:0;outline:0;background:transparent;font:inherit;width:100%}.section{margin:34px 0 44px}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:14px}.section h2{font-size:28px;margin:0}.section p{margin:6px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer}.media{height:320px;background:var(--soft);overflow:hidden}.media img{width:100%;height:100%;object-fit:cover;display:block}.placeholder{height:100%;display:grid;place-items:center;color:var(--muted)}.body{padding:16px}.code{color:var(--muted);font-size:12px;letter-spacing:.06em}.title{font-size:21px;font-weight:850;margin:10px 0 8px;line-height:1.2}.price{font-size:24px;font-weight:850}.meta{color:var(--muted);font-size:13px;line-height:1.5;margin-top:8px}.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;color:var(--muted);line-height:1.7}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:10;padding:18px;overflow:auto}.modal.open{display:block}.panel{max-width:980px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.25)}.modal-img{background:#f4f1eb;display:grid;place-items:center;min-height:420px}.modal-img img{max-width:100%;max-height:70vh;object-fit:contain}.modal-info{padding:22px}.close{float:right;border:1px solid var(--line);border-radius:999px;background:#fff;width:42px;height:42px;font-size:24px}.thumbs{display:flex;gap:8px;overflow:auto;padding:10px 18px 18px;background:#f4f1eb}.thumb{width:70px;height:70px;border:2px solid transparent;border-radius:12px;overflow:hidden;flex:none;background:#fff}.thumb.active{border-color:#111}.thumb img{width:100%;height:100%;object-fit:cover}.loading{padding:30px;text-align:center;color:var(--muted)}
    @media(max-width:620px){.page{padding:18px 14px 58px}.top{align-items:flex-start}.mark{width:42px;height:42px}.brand h1{font-size:24px}.brand p{font-size:14px}.search{border-radius:18px;margin:22px 0}.section{margin:34px 0 42px}.section h2{font-size:32px}.section p{font-size:17px}.grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border-radius:18px}.media{height:150px}.body{padding:10px}.code{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title{font-size:17px;min-height:42px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.price{font-size:24px}.meta{display:none}.modal{padding:0}.panel{border-radius:0;min-height:100vh}.modal-img{min-height:420px}.modal-info{padding:20px}.section-head{align-items:center}.section-head p{font-size:15px}}
    @media(max-width:390px){.media{height:132px}.title{font-size:15px}.price{font-size:21px}.grid{gap:8px}}
  </style>
</head>
<body>
  <main class="page">
    <header class="top"><div class="mark">PF</div><div class="brand"><h1>款式预览小册</h1><p>清爽运动风款式展示 · 快速版</p></div></header>
    <label class="search">⌕<input id="search" placeholder="搜索编号、款式、颜色、尺码、价格..."></label>
    <div id="app" class="loading">正在快速读取商品...</div>
  </main>
  <section class="modal" id="modal"><div class="panel"><div class="modal-img" id="modalImg"></div><div class="thumbs" id="thumbs"></div><div class="modal-info"><button class="close" id="close">×</button><div class="code" id="mCode"></div><h2 id="mTitle"></h2><div class="price" id="mPrice"></div><p class="meta" id="mMeta"></p><p id="mNote"></p></div></div></section>
<script>
const API='https://style-catalog-api.893380992.workers.dev/api/products-lite';
const sectionOrder=['新品上新','常规款式','清仓打折'];
const sectionSub={'新品上新':'本期新款集中展示，统一新款价。','常规款式':'日常可选款式，适合快速浏览。','清仓打折':'清仓款式集中展示，统一清仓价。'};
let products=[];let currentImages=[];let currentIndex=0;
const $=id=>document.getElementById(id);
init();
async function init(){
  try{
    const res=await fetch(API+'?v='+Date.now(),{cache:'no-store'});
    const data=await res.json();
    products=Array.isArray(data.products)?data.products:[];
    render();
  }catch(err){
    $('app').innerHTML='<div class="notice">商品加载失败：'+safe(err.message||String(err))+'</div>';
  }
}
$('search').addEventListener('input',render);
function render(){
  const q=$('search').value.trim().toLowerCase();
  const list=products.filter(p=>!q || [p.code,p.style,p.color,p.size,p.price,p.section,p.note].join(' ').toLowerCase().includes(q));
  if(!list.length){$('app').innerHTML='<div class="notice">没有找到商品。</div>';return;}
  if(q){$('app').innerHTML='<section class="section"><div class="section-head"><div><h2>搜索结果</h2><p>共 '+list.length+' 款</p></div></div><div class="grid">'+list.map(card).join('')+'</div></section>';return;}
  $('app').innerHTML=sectionOrder.map(sec=>{
    const arr=list.filter(p=>(p.section||'常规款式')===sec);
    if(!arr.length)return '';
    return '<section class="section"><div class="section-head"><div><h2>'+sec+'</h2><p>'+sectionSub[sec]+'</p></div></div><div class="grid">'+arr.map(card).join('')+'</div></section>';
  }).join('') || '<div class="notice">暂无可显示商品。</div>';
}
function card(p){
  return '<article class="card" onclick="openProduct(\''+safeAttr(p.id)+'\')"><div class="media">'+(p.cover?'<img loading="lazy" src="'+safeAttr(p.cover)+'" alt="'+safeAttr(p.style)+'">':'<div class="placeholder">待上传图片</div>')+'</div><div class="body"><div class="code">'+safe(p.code)+'</div><div class="title">'+safe(p.style)+'</div><div class="price">'+safe(p.price)+'</div><div class="meta">尺码 '+safe(p.size)+'<br>颜色 '+safe(p.color)+'</div></div></article>';
}
function openProduct(id){
  const p=products.find(x=>String(x.id)===String(id));if(!p)return;
  currentImages=Array.isArray(p.images)?p.images:[];currentIndex=0;
  $('mCode').textContent=p.code||'';$('mTitle').textContent=p.style||'';$('mPrice').textContent=p.price||'';
  $('mMeta').textContent='尺码：'+(p.size||'')+' ｜ 颜色：'+(p.color||'')+' ｜ 分区：'+(p.section||'');$('mNote').textContent=p.note||'';
  setImage(0);
  $('thumbs').innerHTML=currentImages.map((src,i)=>'<button class="thumb '+(i===0?'active':'')+'" onclick="setImage('+i+')"><img src="'+safeAttr(src)+'"></button>').join('');
  $('modal').classList.add('open');document.body.style.overflow='hidden';
}
function setImage(i){currentIndex=i;const src=currentImages[i];$('modalImg').innerHTML=src?'<img src="'+safeAttr(src)+'">':'<div class="placeholder">暂无图片</div>';document.querySelectorAll('.thumb').forEach((b,n)=>b.classList.toggle('active',n===i));}
$('close').onclick=closeModal;$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function closeModal(){$('modal').classList.remove('open');document.body.style.overflow='';}
function safe(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function safeAttr(s){return safe(s).replace(/`/g,'&#96;');}
</script>
</body>
</html>

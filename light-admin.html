<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>轻量上架后台</title>
  <style>
    body{margin:0;padding:18px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#fbfaf7;color:#171717}
    h1{font-size:22px;margin:0 0 8px}.muted{color:#777;font-size:13px;line-height:1.7}.box{background:#fff;border:1px solid #e6e1d8;border-radius:18px;padding:14px;margin:14px 0}.field{margin:12px 0}.field label{display:block;font-size:13px;color:#666;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #e6e1d8;border-radius:14px;background:#fff;padding:12px;font:inherit}.field textarea{min-height:72px}.btn{width:100%;border:0;border-radius:999px;background:#111;color:#fff;padding:14px;font-weight:700;font:inherit;margin-top:10px}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn:disabled{opacity:.45}.ok{color:#0a7a32}.bad{color:#9a312d}.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.preview img{width:100%;height:90px;object-fit:cover;border-radius:12px;border:1px solid #eee}.small{font-size:12px;color:#777;line-height:1.6}.item{border-top:1px solid #eee;padding-top:10px;margin-top:10px}.pill{display:inline-block;background:#f4f1eb;border:1px solid #e6e1d8;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px}
  </style>
</head>
<body>
  <h1>轻量上架后台</h1>
  <p class="muted">临时用于真实商品测试。它会保留已有商品，并把新上传图片强压缩，避免手机端空白。</p>
  <div class="box" id="status">正在读取当前商品...</div>
  <div class="box">
    <div class="field"><label>ADMIN_KEY（只在你浏览器里使用，不要发给别人）</label><input id="key" type="password" placeholder="输入后台密钥"></div>
    <div class="field"><label>分区</label><select id="section"><option>新品上新</option><option>常规款式</option><option>清仓打折</option></select></div>
    <div class="field"><label>商品编号</label><input id="code" placeholder="例如 PF-NEW-002"></div>
    <div class="field"><label>款式名称</label><input id="style" placeholder="例如 浅蓝翻领足球风短袖"></div>
    <div class="field"><label>价格</label><select id="price"><option>¥189</option><option>¥129</option><option>¥99</option></select></div>
    <div class="field"><label>颜色</label><input id="color" placeholder="例如 蓝 / 白 / 黑"></div>
    <div class="field"><label>尺码</label><input id="size" value="S / M / L / XL"></div>
    <div class="field"><label>材质</label><input id="material" value="聚酯纤维速干运动面料"></div>
    <div class="field"><label>备注</label><textarea id="note" placeholder="给顾客看的描述"></textarea></div>
    <div class="field"><label>商品图片（建议每个商品先 1–3 张）</label><input id="imgs" type="file" accept="image/*" multiple></div>
    <div class="small" id="info">未选择图片</div>
    <div class="preview" id="preview"></div>
    <button class="btn" id="save">保存 / 更新这个商品</button>
    <a class="btn secondary" href="/index.html?v=light-admin-preview" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box">打开前台预览</a>
    <div class="small" id="result"></div>
  </div>
<script>
let products=[];let imageData=[];
const $=id=>document.getElementById(id);
init();
async function init(){
  try{
    const res=await fetch('/api/products?light_admin='+Date.now(),{cache:'no-store'});
    const data=await res.json();
    products=Array.isArray(data.products)?data.products:[];
    renderStatus();
  }catch(err){
    $('status').innerHTML='<b class="bad">读取当前商品失败：</b>'+escapeHtml(err.message||String(err));
  }
}
function renderStatus(){
  $('status').innerHTML='<b class="ok">已读取当前商品：'+products.length+' 个</b>'+products.slice(0,20).map(p=>'<div class="item"><b>'+escapeHtml(p.style||'未命名')+'</b><br><span class="pill">'+escapeHtml(p.code||'')+'</span><span class="pill">'+escapeHtml(p.section||'')+'</span><span class="pill">图片 '+((p.images||[]).length)+' 张</span></div>').join('');
}
$('section').onchange=()=>{$('price').value=$('section').value==='新品上新'?'¥189':$('section').value==='清仓打折'?'¥99':'¥129';};
$('imgs').addEventListener('change', async e=>{
  imageData=[]; $('preview').innerHTML=''; $('info').textContent='正在压缩图片...';
  const files=Array.from(e.target.files).slice(0,3);
  for(const file of files){ imageData.push(await compressFile(file)); }
  const total=imageData.reduce((n,s)=>n+s.length,0);
  $('info').innerHTML='已压缩 '+imageData.length+' 张，图片数据合计约 '+Math.round(total/1024)+' KB';
  $('preview').innerHTML=imageData.map(src=>'<img src="'+src+'">').join('');
});
async function compressFile(file){
  const dataUrl=await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const maxSide=560, quality=0.5;
      const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*scale));
      const h=Math.max(1,Math.round(img.height*scale));
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
      const out=canvas.toDataURL('image/jpeg',quality);
      resolve(out&&out.length<dataUrl.length?out:dataUrl);
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
$('save').onclick=async ()=>{
  const key=$('key').value.trim(); if(!key){alert('请先输入 ADMIN_KEY');return;}
  const code=$('code').value.trim(); if(!code){alert('请填写商品编号');return;}
  const style=$('style').value.trim(); if(!style){alert('请填写款式名称');return;}
  if(!imageData.length && !confirm('你还没有选择图片，确定保存无图商品吗？')) return;
  $('save').disabled=true; $('result').textContent='正在保存...';
  const item={
    id:'p'+Date.now(),section:$('section').value,code,style,price:$('price').value,
    color:$('color').value.trim()||'待补充',size:$('size').value.trim()||'S / M / L / XL',
    material:$('material').value.trim()||'聚酯纤维速干运动面料',note:$('note').value.trim(),images:imageData.slice(0,3)
  };
  const oldIndex=products.findIndex(p=>String(p.code||'')===code);
  if(oldIndex>=0){ item.id=products[oldIndex].id||item.id; products[oldIndex]=item; } else { products.push(item); }
  products=products.map((p,i)=>({...p,sort_order:i+1}));
  try{
    const res=await fetch('/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key},body:JSON.stringify({products}),cache:'no-store'});
    const data=await res.json().catch(()=>({ok:false,error:'接口返回不是 JSON'}));
    if(!res.ok || data.ok===false) throw new Error(data.error||('请求失败 '+res.status));
    products=Array.isArray(data.products)?data.products:products;
    renderStatus();
    $('result').innerHTML='<b class="ok">保存成功。</b>现在可以打开前台预览。';
  }catch(err){
    $('result').innerHTML='<b class="bad">保存失败：</b>'+escapeHtml(err.message||String(err));
  }finally{$('save').disabled=false;}
};
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>

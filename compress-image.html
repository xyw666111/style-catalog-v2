<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>商品图片压缩工具</title>
  <style>
    body{margin:0;padding:18px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#fbfaf7;color:#171717}
    h1{font-size:24px;margin:0 0 8px}.muted{color:#74706a;font-size:14px;line-height:1.7}.box{background:#fff;border:1px solid #e6e1d8;border-radius:18px;padding:14px;margin:14px 0}.field{margin:12px 0}.field label{display:block;font-size:13px;color:#666;margin-bottom:6px}.field input,.field select{width:100%;box-sizing:border-box;border:1px solid #e6e1d8;border-radius:14px;background:#fff;padding:12px;font:inherit}.btn{width:100%;border:0;border-radius:999px;background:#111;color:#fff;padding:14px;font-weight:700;font:inherit;margin-top:10px;text-align:center;text-decoration:none;display:block}.btn:disabled{opacity:.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.preview{display:grid;grid-template-columns:1fr 1fr;gap:12px}.preview img{width:100%;border-radius:14px;border:1px solid #eee;background:#f4f1eb}.small{font-size:12px;color:#777;line-height:1.6;word-break:break-all}.ok{color:#0a7a32}.bad{color:#9a312d}@media(max-width:620px){.preview,.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>商品图片压缩工具</h1>
  <p class="muted">用于方案 B：先把图片压缩成轻量 JPG，再上传到 GitHub 的 images/products 文件夹。图片只在你的浏览器本地处理，不会上传到服务器。</p>
  <div class="box">
    <div class="field"><label>选择原图</label><input id="file" type="file" accept="image/*"></div>
    <div class="row">
      <div class="field"><label>最长边像素</label><select id="maxSide"><option value="900">900（推荐，速度快）</option><option value="1100">1100（更清晰）</option><option value="700">700（更快）</option></select></div>
      <div class="field"><label>压缩质量</label><select id="quality"><option value="0.72">0.72（推荐）</option><option value="0.62">0.62（更小）</option><option value="0.82">0.82（更清晰）</option></select></div>
    </div>
    <div class="field"><label>下载文件名</label><input id="name" value="PF-TEST-001-1.jpg"></div>
    <button class="btn" id="compress">压缩图片</button>
    <a class="btn" id="download" style="display:none" download="PF-TEST-001-1.jpg">下载压缩后的图片</a>
    <div class="small" id="result"></div>
  </div>
  <div class="box preview" id="preview" style="display:none">
    <div><div class="small">原图</div><img id="before"></div>
    <div><div class="small">压缩后</div><img id="after"></div>
  </div>
<script>
const $=id=>document.getElementById(id);
let originalData='';
$('file').addEventListener('change',()=>{
  const f=$('file').files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{originalData=reader.result;$('before').src=originalData;$('preview').style.display='grid';$('result').textContent='已选择原图：'+formatSize(f.size);};
  reader.readAsDataURL(f);
});
$('compress').onclick=async()=>{
  const f=$('file').files[0];
  if(!f){alert('请先选择图片');return;}
  const fileName=($('name').value.trim()||'PF-TEST-001-1.jpg').replace(/\.png$/i,'.jpg').replace(/\.jpeg$/i,'.jpg');
  $('compress').disabled=true;$('result').textContent='正在压缩...';
  try{
    const img=await loadImage(originalData||await readFile(f));
    const maxSide=Number($('maxSide').value)||900;
    const quality=Number($('quality').value)||0.72;
    const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
    const w=Math.max(1,Math.round(img.width*scale));
    const h=Math.max(1,Math.round(img.height*scale));
    const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
    const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',quality));
    const url=URL.createObjectURL(blob);
    $('after').src=url;
    $('download').href=url;
    $('download').download=fileName;
    $('download').style.display='block';
    const percent=Math.round(blob.size/f.size*100);
    $('result').innerHTML='<b class="ok">压缩完成。</b><br>原图：'+formatSize(f.size)+'<br>压缩后：'+formatSize(blob.size)+'（约为原图 '+percent+'%）<br>尺寸：'+w+' × '+h+'<br>下载文件名：'+escapeHtml(fileName);
  }catch(err){$('result').innerHTML='<b class="bad">压缩失败：</b>'+escapeHtml(err.message||String(err));}
  finally{$('compress').disabled=false;}
};
function readFile(f){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(f);});}
function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src;});}
function formatSize(n){if(!n&&n!==0)return ''; if(n<1024)return n+' B'; if(n<1024*1024)return Math.round(n/1024)+' KB'; return (n/1024/1024).toFixed(2)+' MB';}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>

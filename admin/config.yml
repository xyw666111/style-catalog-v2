backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "catalog"
    label: "款式图册"
    files:
      - name: "products"
        label: "商品列表"
        file: "data/products.json"
        fields:
          - label: "商品"
            name: "products"
            widget: "list"
            summary: "{{fields.section}} · {{fields.code}} · {{fields.style}} · {{fields.price}}"
            fields:
              - {label: "商品编号", name: "code", widget: "string"}
              - {label: "款式名称", name: "style", widget: "string"}
              - label: "分区"
                name: "section"
                widget: "select"
                options: ["新品上新", "常规款式", "清仓打折"]
                default: "常规款式"
                hint: "新品默认 ¥189，常规默认 ¥129，清仓默认 ¥99。"
              - label: "价格"
                name: "price"
                widget: "select"
                options: ["¥189", "¥129", "¥99"]
                default: "¥129"
              - {label: "颜色", name: "color", widget: "string", required: false}
              - {label: "尺码", name: "size", widget: "string", default: "S / M / XL / XXL"}
              - {label: "材质", name: "condition", widget: "string", default: "聚酯纤维速干运动面料"}
              - {label: "备注", name: "note", widget: "text", required: false}
              - label: "商品图片"
                name: "images"
                widget: "list"
                required: false
                hint: "第一张图片会自动作为前台封面。可以拖动调整顺序，最多建议 6 张。"
                field: {label: "图片", name: "image", widget: "image"}

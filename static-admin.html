<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>静态图片上架后台</title>
  <style>
    body{margin:0;padding:18px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#fbfaf7;color:#171717}
    h1{font-size:24px;margin:0 0 8px}.muted{color:#74706a;font-size:14px;line-height:1.7}.box{background:#fff;border:1px solid #e6e1d8;border-radius:18px;padding:14px;margin:14px 0}.field{margin:12px 0}.field label{display:block;font-size:13px;color:#666;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #e6e1d8;border-radius:14px;background:#fff;padding:12px;font:inherit}.field textarea{min-height:76px}.btn{width:100%;border:0;border-radius:999px;background:#111;color:#fff;padding:14px;font-weight:700;font:inherit;margin-top:10px;text-align:center;text-decoration:none;display:block}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn:disabled{opacity:.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:12px;color:#777;line-height:1.6;word-break:break-all}.ok{color:#0a7a32}.bad{color:#9a312d}.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.preview img{width:100%;height:120px;object-fit:cover;border-radius:12px;background:#f4f1eb;border:1px solid #eee}.path{background:#f4f1eb;border-radius:12px;padding:10px;margin-top:8px}.item{border-top:1px solid #eee;padding:10px 0}.pill{display:inline-block;background:#f4f1eb;border:1px solid #e6e1d8;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px}@media(max-width:620px){.row{grid-template-columns:1fr}.preview{grid-template-columns:repeat(3,1fr)}.preview img{height:95px}}
  </style>
</head>
<body>
  <h1>静态图片上架后台</h1>
  <p class="muted">用于方案 B：图片先用批量工具压缩改名并上传 GitHub，这里只保存图片路径，不再保存 base64 大图。</p>
  <div class="box" id="status">正在读取当前商品...</div>
  <div class="box">
    <div class="field"><label>ADMIN_KEY</label><input id="key" type="password" placeholder="输入后台密钥"></div>
    <div class="row"><div class="field"><label>商品编号</label><input id="code" value="PF-TEST-002" placeholder="例如 PF-NEW-001"></div><div class="field"><label>图片数量</label><select id="count"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option></select></div></div>
    <div class="field"><label>款式名称</label><input id="style" value="静态图片正式测试款" placeholder="例如 巴西浅绿色足球风短袖"></div>
    <div class="row"><div class="field"><label>分区</label><select id="section"><option>新品上新</option><option>常规款式</option><option>清仓打折</option></select></div><div class="field"><label>价格</label><select id="price"><option>¥189</option><option>¥129</option><option>¥99</option></select></div></div>
    <div class="row"><div class="field"><label>颜色</label><input id="color" value="待补充"></div><div class="field"><label>尺码</label><input id="size" value="S / M / L / XL"></div></div>
    <div class="field"><label>材质</label><input id="material" value="聚酯纤维速干运动面料"></div>
    <div class="field"><label>备注</label><textarea id="note" placeholder="商品描述"></textarea></div>
    <div class="path small" id="paths"></div>
    <div class="preview" id="preview"></div>
    <button class="btn" id="save">保存 / 更新这个商品</button>
    <a class="btn secondary" href="/index.html?v=static-admin-preview" target="_blank">打开前台预览</a>
    <div class="small" id="result"></div>
  </div>
<script>
const $=id=>document.getElementById(id);let products=[];
init();['code','count'].forEach(id=>$(id).addEventListener('input',renderPaths));$('count').addEventListener('change',renderPaths);
$('section').addEventListener('change',()=>{$('price').value=$('section').value==='新品上新'?'¥189':$('section').value==='清仓打折'?'¥99':'¥129';});
async function init(){renderPaths();try{const res=await fetch('/api/products?static_admin='+Date.now(),{cache:'no-store'});const data=await res.json();products=Array.isArray(data.products)?data.products:[];renderStatus();}catch(err){$('status').innerHTML='<b class="bad">读取当前商品失败：</b>'+escapeHtml(err.message||String(err));}}
function renderStatus(){$('status').innerHTML='<b class="ok">已读取当前商品：'+products.length+' 个</b>'+products.slice(0,20).map(p=>'<div class="item"><b>'+escapeHtml(p.style||'未命名')+'</b><br><span class="pill">'+escapeHtml(p.code||'')+'</span><span class="pill">'+escapeHtml(p.section||'')+'</span><span class="pill">图片 '+((p.images||[]).length)+' 张</span></div>').join('');}
function cleanCode(s){return String(s||'').trim().replace(/\s+/g,'-').replace(/[^A-Za-z0-9_-]/g,'').replace(/-+/g,'-')||'PF-TEST-002';}
function getPaths(){const code=cleanCode($('code').value);const count=Math.max(1,Math.min(6,Number($('count').value)||1));return Array.from({length:count},(_,i)=>'/images/products/'+code+'-'+(i+1)+'.jpg');}
function renderPaths(){const paths=getPaths();$('paths').innerHTML='<b>将保存这些图片路径：</b><br>'+paths.map(escapeHtml).join('<br>');$('preview').innerHTML=paths.map(p=>'<img src="'+escapeAttr(p)+'?v='+Date.now()+'" onerror="this.style.opacity=.25" alt="预览">').join('');}
$('save').onclick=async()=>{const key=$('key').value.trim();if(!key){alert('请先输入 ADMIN_KEY');return;}const code=cleanCode($('code').value);if(!code){alert('请填写商品编号');return;}const images=getPaths();const existing=products.find(p=>String(p.code||'')===code);const product={id:existing&&existing.id?existing.id:'static-'+code+'-'+Date.now(),code,style:$('style').value.trim()||'未命名款式',section:$('section').value,price:$('price').value,color:$('color').value.trim()||'待补充',size:$('size').value.trim()||'S / M / L / XL',material:$('material').value.trim()||'聚酯纤维速干运动面料',condition:$('material').value.trim()||'聚酯纤维速干运动面料',note:$('note').value.trim(),images,sort_order:existing&&existing.sort_order?existing.sort_order:products.length+1};$('save').disabled=true;$('result').textContent='正在保存...';try{const res=await fetch('/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key},body:JSON.stringify({product}),cache:'no-store'});const data=await res.json().catch(()=>({ok:false,error:'接口返回不是 JSON'}));if(!res.ok||data.ok===false)throw new Error(data.error||('请求失败 '+res.status));const idx=products.findIndex(p=>String(p.code||'')===code);if(idx>=0)products[idx]=product;else products.push(product);renderStatus();$('result').innerHTML='<b class="ok">保存成功。</b>现在可以打开前台预览。';}catch(err){$('result').innerHTML='<b class="bad">保存失败：</b>'+escapeHtml(err.message||String(err));}finally{$('save').disabled=false;}};
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/`/g,'&#96;');}
</script>
</body>
</html>

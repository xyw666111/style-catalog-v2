<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>批量图片压缩改名工具</title>
  <style>
    body{margin:0;padding:18px;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#fbfaf7;color:#171717}
    h1{font-size:24px;margin:0 0 8px}.muted{color:#74706a;font-size:14px;line-height:1.7}.box{background:#fff;border:1px solid #e6e1d8;border-radius:18px;padding:14px;margin:14px 0}.field{margin:12px 0}.field label{display:block;font-size:13px;color:#666;margin-bottom:6px}.field input,.field select{width:100%;box-sizing:border-box;border:1px solid #e6e1d8;border-radius:14px;background:#fff;padding:12px;font:inherit}.btn{width:100%;border:0;border-radius:999px;background:#111;color:#fff;padding:14px;font-weight:700;font:inherit;margin-top:10px;text-align:center;text-decoration:none;display:block}.btn.secondary{background:#fff;color:#111;border:1px solid #111}.btn:disabled{opacity:.45}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:12px;color:#777;line-height:1.6;word-break:break-all}.ok{color:#0a7a32}.bad{color:#9a312d}.item{border-top:1px solid #eee;padding:12px 0;display:grid;grid-template-columns:84px 1fr;gap:12px;align-items:center}.item img{width:84px;height:84px;object-fit:cover;border-radius:12px;background:#f4f1eb;border:1px solid #eee}.links{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}.links a{border:1px solid #111;border-radius:999px;text-align:center;text-decoration:none;color:#111;padding:10px;font-weight:700}.path{background:#f4f1eb;border-radius:10px;padding:8px;margin-top:6px}.notice{background:#fff7ed;border-color:#fed7aa;color:#8a4b0a}@media(max-width:620px){.row{grid-template-columns:1fr}.item{grid-template-columns:70px 1fr}.item img{width:70px;height:70px}}
  </style>
</head>
<body>
  <h1>批量图片压缩改名工具</h1>
  <p class="muted">用于方案 B：一次选择多张图片，自动压缩成轻量 JPG，并按商品编号自动改名。处理完成后，下载 JPG，再上传到 GitHub 的 图片 / 产品 文件夹。</p>
  <div class="box notice"><b>说明：</b>这个页面只在你的浏览器本地处理图片，不会直接上传 GitHub。直接上传 GitHub 需要权限密钥，不建议做进网页里。</div>
  <div class="box">
    <div class="field"><label>选择多张原图</label><input id="files" type="file" accept="image/*" multiple></div>
    <div class="row">
      <div class="field"><label>商品编号前缀</label><input id="code" value="PF-TEST-001" placeholder="例如 PF-NEW-001"></div>
      <div class="field"><label>图片起始序号</label><input id="start" type="number" value="1" min="1"></div>
    </div>
    <div class="row">
      <div class="field"><label>最长边像素</label><select id="maxSide"><option value="900">900（推荐，速度快）</option><option value="1100">1100（更清晰）</option><option value="700">700（更快）</option></select></div>
      <div class="field"><label>压缩质量</label><select id="quality"><option value="0.72">0.72（推荐）</option><option value="0.62">0.62（更小）</option><option value="0.82">0.82（更清晰）</option></select></div>
    </div>
    <button class="btn" id="run">批量压缩并改名</button>
    <button class="btn secondary" id="downloadAll" style="display:none">依次下载全部图片</button>
    <div class="small" id="summary">未选择图片</div>
  </div>
  <div class="box" id="output" style="display:none"><b>处理结果</b><div id="list"></div></div>
<script>
const $=id=>document.getElementById(id);
let results=[];
$('files').addEventListener('change',()=>{$('summary').textContent='已选择 '+$('files').files.length+' 张图片';});
$('run').onclick=async()=>{
  const files=Array.from($('files').files||[]);
  if(!files.length){alert('请先选择图片');return;}
  const code=cleanCode($('code').value.trim()||'PF-TEST-001');
  const start=Math.max(1,Number($('start').value)||1);
  const maxSide=Number($('maxSide').value)||900;
  const quality=Number($('quality').value)||0.72;
  results=[];$('list').innerHTML='';$('output').style.display='block';$('run').disabled=true;$('summary').textContent='正在处理 0 / '+files.length+' ...';
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const name=code+'-'+(start+i)+'.jpg';
    const r=await compressFile(f,name,maxSide,quality);
    results.push(r);
    addItem(r,i+1);
    $('summary').textContent='正在处理 '+(i+1)+' / '+files.length+' ...';
  }
  const before=results.reduce((n,r)=>n+r.before,0), after=results.reduce((n,r)=>n+r.after,0);
  $('summary').innerHTML='<b class="ok">处理完成。</b><br>共 '+results.length+' 张。原图合计 '+formatSize(before)+'，压缩后合计 '+formatSize(after)+'。<br>现在点击每张图的下载按钮，或点“依次下载全部图片”。';
  $('downloadAll').style.display='block';$('run').disabled=false;
};
$('downloadAll').onclick=()=>{
  let delay=0;
  results.forEach(r=>{setTimeout(()=>{const a=document.createElement('a');a.href=r.url;a.download=r.name;document.body.appendChild(a);a.click();a.remove();},delay);delay+=500;});
};
async function compressFile(file,name,maxSide,quality){
  const src=await readFile(file);
  const img=await loadImage(src);
  const scale=Math.min(1,maxSide/Math.max(img.width,img.height));
  const w=Math.max(1,Math.round(img.width*scale));
  const h=Math.max(1,Math.round(img.height*scale));
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',quality));
  return {name,url:URL.createObjectURL(blob),before:file.size,after:blob.size,w,h,src};
}
function addItem(r,index){
  const path='/images/products/'+r.name;
  const div=document.createElement('div');div.className='item';
  div.innerHTML='<img src="'+r.url+'"><div><b>第 '+index+' 张：'+escapeHtml(r.name)+'</b><div class="small">原图 '+formatSize(r.before)+' → 压缩后 '+formatSize(r.after)+' ｜ 尺寸 '+r.w+'×'+r.h+'</div><div class="path small">商品图片路径：'+escapeHtml(path)+'</div><div class="links"><a download="'+escapeHtml(r.name)+'" href="'+r.url+'">下载这张 JPG</a></div></div>';
  $('list').appendChild(div);
}
function cleanCode(s){return String(s).replace(/\s+/g,'-').replace(/[^A-Za-z0-9_-]/g,'').replace(/-+/g,'-')||'PF-TEST-001';}
function readFile(f){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.onerror=reject;reader.readAsDataURL(f);});}
function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src;});}
function formatSize(n){if(n<1024)return n+' B';if(n<1024*1024)return Math.round(n/1024)+' KB';return (n/1024/1024).toFixed(2)+' MB';}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>

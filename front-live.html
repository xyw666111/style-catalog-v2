<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>款式预览小册</title>
<style>
:root{--bg:#fbfaf7;--card:#fff;--ink:#171717;--muted:#74706a;--line:#e6e1d8;--soft:#f4f1eb}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.page{max-width:1180px;margin:auto;padding:20px 16px 70px}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 0 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(251,250,247,.94);backdrop-filter:blur(14px);z-index:5}.brand{display:flex;gap:12px;align-items:center}.mark{width:38px;height:38px;border:1px solid #111;border-radius:999px;display:grid;place-items:center;font-weight:800}.brand h1{font-size:18px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:3px 0 0}.nav{display:flex;gap:8px}.nav button,.nav a,.btn{border:1px solid #111;background:#fff;color:#111;border-radius:999px;padding:10px 14px;font-weight:700;text-decoration:none;cursor:pointer}.hero{padding:44px 0 26px;max-width:720px}.hero h2{font-size:48px;line-height:1.05;margin:0 0 14px}.hero p{color:var(--muted);line-height:1.8}.search{width:100%;border:1px solid var(--line);border-radius:999px;background:#fff;padding:14px 18px;font:inherit;margin:0 0 24px}.sections{display:flex;flex-direction:column;gap:42px}.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}.section-head h3{font-size:26px;margin:0}.section-head p{font-size:13px;color:var(--muted);margin:6px 0 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden}.media{height:360px;background:var(--soft);cursor:pointer}.media img{width:100%;height:100%;object-fit:cover;display:block}.placeholder{height:100%;display:grid;place-items:center;color:var(--muted)}.body{padding:16px}.code{font-size:12px;color:var(--muted);letter-spacing:.08em}.title{font-size:21px;font-weight:850;margin:10px 0}.price{font-size:22px;font-weight:850;margin-bottom:12px}.spec{font-size:13px;color:var(--muted);margin:5px 0}.spec b{color:#111}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.primary{background:#111!important;color:#fff!important}.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:30;padding:26px;overflow:auto}.modal.open{display:block}.panel{max-width:980px;margin:auto;background:#fff;border-radius:26px;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}.main-img{background:var(--soft);border-radius:20px;min-height:520px;display:grid;place-items:center;overflow:hidden}.main-img img{width:100%;max-height:520px;object-fit:contain}.modal h3{font-size:34px;margin:16px 0 8px}.detail{border-top:1px solid var(--line);margin:22px 0}.detail div{display:flex;justify-content:space-between;gap:18px;border-bottom:1px solid var(--line);padding:12px 0}.close{float:right}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;border-radius:999px;display:none}.toast.show{display:block}@media(max-width:760px){.topbar{display:block}.nav{margin-top:12px}.hero{display:none}.grid{grid-template-columns:repeat(2,1fr);gap:12px}.media{height:235px}.panel{grid-template-columns:1fr;border-radius:0;min-height:100vh}.modal{padding:0}.main-img{min-height:420px}.title{font-size:17px}.actions{grid-template-columns:1fr}.actions .btn:not(.primary){display:none}}
</style>
</head>
<body>
<main class="page">
<header class="topbar"><div class="brand"><div class="mark">PF</div><div><h1>款式预览小册</h1><p>清爽运动风款式展示</p></div></div><nav class="nav"><button id="homeBtn">首页</button><button id="backBtn">返回上一层</button><a href="jersey-upload-admin.html">返回后台</a></nav></header>
<section class="hero"><h2>款式预览小册</h2><p>点击图片查看多张展示图，确认尺码、颜色与价格；看中后复制款式信息再联系确认。</p></section>
<input class="search" id="searchInput" placeholder="搜索编号、款式、颜色、尺码、价格...">
<section id="grid" class="grid"><div class="notice">正在加载商品...</div></section>
</main>
<section class="modal" id="modal"><div class="panel"><div class="main-img" id="mainImg"></div><div><button class="btn close" id="closeBtn">×</button><div class="code" id="modalCode"></div><h3 id="modalTitle"></h3><div class="price" id="modalPrice"></div><p id="modalDesc"></p><div class="detail" id="details"></div><div class="actions"><button class="btn primary" id="copyInfo">复制款式信息</button><button class="btn" id="copyCode">复制编号</button></div></div></div></section>
<div class="toast" id="toast">已复制</div>
<script>
const API='https://style-catalog-api.893380992.workers.dev';
const DEFAULT_SIZE='S / M / L / XL / 2XL / 3XL';
const SECTIONS=['新品上新','常规款式','清仓打折'];
const SUB={'新品上新':'本期新款集中展示。','常规款式':'日常可选款式。','清仓打折':'清仓款式。'};
const $=id=>document.getElementById(id);
let products=[],currentSection='',currentProduct=null;
function size(v){v=String(v||'').trim();return !v||v==='全尺码'?DEFAULT_SIZE:v}
function imgVal(v){return typeof v==='string'?v:(v&&v.url)||(v&&v.src)||(v&&v.image)||''}
function norm(p){const imgs=Array.isArray(p.images)?p.images.map(imgVal).filter(Boolean):[];const cover=imgVal(p.cover)||imgs[0]||'';return {...p,images:imgs.length?imgs:(cover?[cover]:[]),cover,section:p.section||'常规款式',price:p.price||'¥129',size:size(p.size),condition:p.condition||p.material||'聚酯纤维速干运动面料'}}
function rank(p){const n=Number(p.sort_order);return n>=1&&n<=3?n:0}
function sectionIndex(s){const i=SECTIONS.indexOf(s);return i<0?99:i}
function sectionSort(a,b){return rank(a)-rank(b)||Number(a.sort_order||999999999)-Number(b.sort_order||999999999)||String(a.code||'').localeCompare(String(b.code||''),'zh-CN')}
function mixedSort(a,b){return sectionIndex(a.section)-sectionIndex(b.section)||sectionSort(a,b)}
function card(p){const el=document.createElement('article');el.className='card';const media=document.createElement('div');media.className='media';if(p.cover){const im=document.createElement('img');im.src=p.cover;im.loading='lazy';im.decoding='async';media.appendChild(im)}else{const ph=document.createElement('div');ph.className='placeholder';ph.textContent='待上传真实图片';media.appendChild(ph)}media.onclick=()=>openModal(p);const body=document.createElement('div');body.className='body';body.innerHTML='<div class="code"></div><h3 class="title"></h3><div class="price"></div><div class="spec"><b>尺码</b> <span></span></div><div class="spec"><b>颜色</b> <em></em></div>';body.querySelector('.code').textContent=p.code||'';body.querySelector('.title').textContent=p.style||'未命名';body.querySelector('.price').textContent=p.price||'';body.querySelector('span').textContent=p.size||'';body.querySelector('em').textContent=p.color||'';const actions=document.createElement('div');actions.className='actions';const a=document.createElement('button');a.className='btn primary';a.textContent='查看详情';a.onclick=()=>openModal(p);const b=document.createElement('button');b.className='btn';b.textContent='复制编号';b.onclick=()=>copyText(p.code||'');actions.append(a,b);body.appendChild(actions);el.append(media,body);return el}
function sectionBlock(title,list){const sec=document.createElement('section');const head=document.createElement('div');head.className='section-head';const left=document.createElement('div');const h=document.createElement('h3');h.textContent=title;const p=document.createElement('p');p.textContent=SUB[title]||'';left.append(h,p);const btn=document.createElement('button');btn.className='btn';btn.textContent='查看更多';btn.onclick=()=>{currentSection=title;$('searchInput').value='';render()};head.append(left,btn);const grid=document.createElement('div');grid.className='grid';[...list].sort(sectionSort).slice(0,title==='新品上新'?3:6).forEach(x=>grid.appendChild(card(x)));sec.append(head,grid);return sec}
function render(){const q=$('searchInput').value.trim().toLowerCase();let list=products.filter(p=>(!currentSection||p.section===currentSection)&&(!q||[p.code,p.style,p.color,p.size,p.price,p.section,p.note].join(' ').toLowerCase().includes(q)));const box=$('grid');box.innerHTML='';if(!list.length){box.className='grid';const n=document.createElement('div');n.className='notice';n.textContent='没有找到匹配款式。';box.appendChild(n);return}if(currentSection||q){box.className='grid';[...list].sort(currentSection?sectionSort:mixedSort).forEach(p=>box.appendChild(card(p)));return}box.className='sections';SECTIONS.forEach(s=>{const l=list.filter(p=>p.section===s);if(l.length)box.appendChild(sectionBlock(s,l))})}
function openModal(p){currentProduct=p;$('modalCode').textContent=p.code||'';$('modalTitle').textContent=p.style||'未命名';$('modalPrice').textContent=p.price||'';$('modalDesc').textContent=p.note||'暂无备注';$('mainImg').innerHTML='';if(p.images[0]){const im=document.createElement('img');im.src=p.images[0];$('mainImg').appendChild(im)}else{$('mainImg').textContent='待上传真实图片'}$('details').innerHTML='';[['价格',p.price],['尺码',p.size],['颜色',p.color||''],['分区',p.section],['材质',p.condition]].forEach(r=>{const d=document.createElement('div');const a=document.createElement('span');const b=document.createElement('b');a.textContent=r[0];b.textContent=r[1]||'';d.append(a,b);$('details').appendChild(d)});$('modal').classList.add('open');document.body.style.overflow='hidden'}
function closeModal(){$('modal').classList.remove('open');document.body.style.overflow=''}
function goHome(){currentSection='';$('searchInput').value='';render();scrollTo({top:0,behavior:'smooth'})}
function info(p){return '【确认款式】\n编号：'+(p.code||'')+'\n款式：'+(p.style||'')+'\n颜色：'+(p.color||'')+'\n尺码：'+(p.size||'')+'\n价格：'+(p.price||'')+'\n材质：'+(p.condition||'')+'\n备注：'+(p.note||'')+'\n请联系店主确认库存。'}
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('已复制'),()=>toast('复制失败，请手动复制'))}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
$('searchInput').oninput=render;$('homeBtn').onclick=goHome;$('backBtn').onclick=goHome;$('closeBtn').onclick=closeModal;$('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};$('copyInfo').onclick=()=>currentProduct&&copyText(info(currentProduct));$('copyCode').onclick=()=>currentProduct&&copyText(currentProduct.code||'');
fetch(API+'/api/products?light=1',{cache:'no-store'}).then(r=>r.json()).then(d=>{products=(d.products||d||[]).map(norm).sort(mixedSort);render()}).catch(e=>{$('grid').innerHTML='<div class="notice">商品数据加载失败：'+String(e.message||e)+'</div>'});
</script>
</body>
</html>

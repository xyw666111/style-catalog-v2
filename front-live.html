<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>款式预览小册</title>
  <style>
    :root{--bg:#fbfaf7;--card:#fff;--ink:#171717;--muted:#74706a;--line:#e6e1d8;--soft:#f4f1eb;--soft2:#faf7f1;--radius:22px;--shadow:0 18px 50px rgba(20,20,20,.07)}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--ink)}button{font-family:inherit;cursor:pointer;color:inherit}.page{max-width:1220px;margin:0 auto;padding:24px 20px 86px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 0 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(251,250,247,.92);backdrop-filter:blur(16px);z-index:10}.brand{display:flex;gap:12px;align-items:center}.mark{width:38px;height:38px;border-radius:50%;border:1px solid var(--ink);display:grid;place-items:center;font-size:13px;font-weight:780}.brand h1{font-size:18px;margin:0;font-weight:780}.brand p{font-size:12px;margin:3px 0 0;color:var(--muted)}.nav{display:flex;gap:10px}.nav-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:760}.hero{max-width:760px;padding:52px 0 30px}.eyebrow{font-size:12px;color:var(--muted);letter-spacing:.12em;margin:0 0 15px}.hero h2{font-size:52px;line-height:1.02;margin:0 0 18px;letter-spacing:-.055em}.hero p{font-size:16px;line-height:1.8;color:var(--muted);margin:0}.toolbar{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;margin:26px 0 20px}.searchbox{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:13px 16px}.searchbox input{border:0;outline:0;background:transparent;width:100%;font-size:15px}.resultbar{display:none;align-items:center;justify-content:space-between;gap:12px;margin:0 0 18px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--muted);font-size:14px}.resultbar.show{display:flex}.catalog-sections{display:flex;flex-direction:column;gap:46px}.collection-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 18px;padding-top:10px}.collection-head h3{font-size:26px;margin:0}.collection-head p{margin:6px 0 0;color:var(--muted);font-size:13px}.section-link{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 16px;font-size:13px;font-weight:760}.collection-grid,.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 26px rgba(20,20,20,.035)}.media{height:386px;background:var(--soft);position:relative;overflow:hidden;cursor:pointer}.media img{width:100%;height:100%;object-fit:cover;display:block}.placeholder{height:100%;display:grid;place-items:center;color:var(--muted);font-size:13px}.body{padding:18px}.meta{color:var(--muted);font-size:12px;letter-spacing:.08em;margin-bottom:14px}.title{font-size:22px;font-weight:840;line-height:1.2;margin:0 0 10px}.price{font-size:22px;font-weight:840;margin:0 0 14px}.specs{display:grid;gap:6px;margin-bottom:16px}.spec{display:flex;gap:6px;color:var(--muted);font-size:13px}.spec b{color:var(--ink);white-space:nowrap}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:1px solid var(--ink);background:#fff;border-radius:999px;padding:13px 12px;font-weight:760;font-size:14px}.btn.primary{background:var(--ink);color:#fff}.notice{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px 16px;color:var(--muted);font-size:13px;line-height:1.75}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:40;padding:28px;overflow:auto}.modal.open{display:block}.modal-panel{max-width:1180px;margin:0 auto;background:#fff;border-radius:28px;overflow:hidden;display:grid;grid-template-columns:.95fr 1.05fr;box-shadow:0 30px 80px rgba(0,0,0,.25);min-height:720px}.modal-media{background:var(--soft);padding:28px}.main-img-wrap{border:1px dashed #d2cabf;border-radius:22px;overflow:hidden;background:#fbfaf7;display:grid;place-items:center;min-height:570px;position:relative}.main-img-wrap img{width:100%;height:100%;max-height:570px;object-fit:contain;display:block}.thumbs{display:flex;gap:10px;overflow:auto;margin-top:14px}.thumb{width:82px;height:82px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;flex:none;padding:0}.thumb.active{border-color:var(--ink)}.thumb img{width:100%;height:100%;object-fit:cover}.modal-info{padding:44px 42px;position:relative}.close{position:absolute;right:28px;top:28px;border:1px solid var(--line);background:#fff;border-radius:50%;width:42px;height:42px;font-size:18px}.modal-info .code{font-size:12px;color:var(--muted);letter-spacing:.1em;margin-bottom:24px}.modal-info h3{font-size:42px;line-height:1.06;margin:0 56px 8px 0}.desc{color:var(--muted);line-height:1.8;font-size:15px;margin:20px 0 34px}.details{border-top:1px solid var(--line);margin-bottom:28px}.detail-row{display:grid;grid-template-columns:110px 1fr;gap:18px;padding:15px 0;border-bottom:1px solid var(--line);font-size:15px}.detail-row span{color:var(--muted)}.detail-row b{justify-self:end;text-align:right}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;border-radius:999px;font-size:14px;display:none;z-index:60}.toast.show{display:block}@media(max-width:900px){.collection-grid,.grid{grid-template-columns:1fr 1fr}.hero h2{font-size:42px}.toolbar{grid-template-columns:1fr}.modal-panel{grid-template-columns:1fr}.modal-info h3{font-size:34px}.modal-info{padding:34px 24px}}@media(max-width:620px){.page{padding:14px 12px 58px}.topbar{padding:12px 0 12px;gap:12px;flex-wrap:wrap;align-items:flex-start}.brand{width:100%}.nav{width:100%;gap:8px}.nav-btn{flex:1}.hero{display:none}.toolbar{display:block;margin:14px 0}.searchbox{border-radius:18px}.catalog-sections{gap:34px}.collection-grid,.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.collection.new-section .collection-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.collection.new-section .media{height:150px}.collection.new-section .body{padding:8px}.collection.new-section .title{font-size:13px;min-height:32px}.collection.new-section .price{font-size:16px}.collection.new-section .specs,.collection.new-section .actions{display:none}.media{height:236px}.body{padding:12px}.title{font-size:17px}.price{font-size:20px}.actions{grid-template-columns:1fr}.actions .btn:not(.primary){display:none}.modal{padding:0}.modal-panel{border-radius:0;min-height:100vh}.modal-media{padding:18px}.main-img-wrap{min-height:430px}}
  </style>
</head>
<body>
  <main><div class="page"><header class="topbar"><div class="brand"><div class="mark">PF</div><div><h1>款式预览小册</h1><p>清爽运动风款式展示</p></div></div><nav class="nav"><button class="nav-btn" id="homeBtn">首页</button><button class="nav-btn" id="backBtn">返回上一层</button></nav></header><section class="hero"><p class="eyebrow">STYLE CATALOG</p><h2>款式预览小册</h2><p>这里整理了当前可看的运动风短袖款式。点击图片查看多张展示图，确认尺码、颜色与价格；看中后复制款式信息再联系确认。</p></section><section class="toolbar"><label class="searchbox"><span>⌕</span><input id="searchInput" placeholder="搜索编号、款式、颜色、尺码、价格..."></label></section><div class="resultbar" id="resultbar"></div><section class="grid" id="grid"><div class="notice">正在加载商品...</div></section></div></main>
  <section class="modal" id="modal"><div class="modal-panel"><div class="modal-media"><div class="main-img-wrap" id="mainImgWrap"></div><div class="thumbs" id="thumbs"></div></div><div class="modal-info"><button class="close" id="closeBtn">×</button><div class="code" id="modalCode"></div><h3 id="modalTitle"></h3><div class="price" id="modalPrice"></div><p class="desc" id="modalDesc"></p><div class="details" id="details"></div><div class="actions"><button class="btn primary" id="copyConfirm">复制款式信息</button><button class="btn" id="copyCodeBtn">复制编号</button></div></div></div></section><div class="toast" id="toast">已复制</div>
<script>
const API_BASE='https://style-catalog-api.893380992.workers.dev';
let products=[],currentProduct=null,currentImages=[],currentImageIndex=0,currentSection=null;
const $=id=>document.getElementById(id);
const sectionMeta={'新品上新':{subtitle:'本期新款集中展示，统一新款价。'},'常规款式':{subtitle:'日常可选款式，适合快速浏览。'},'清仓打折':{subtitle:'清仓款式集中展示，统一清仓价。'}};
const sectionOrder=['新品上新','常规款式','清仓打折'];
function normalizeImageValue(v){if(!v)return '';if(typeof v==='string')return v;return v.image||v.src||v.url||'';}
function normalizeProduct(p){const imgs=(p.images||[]).map(normalizeImageValue).filter(Boolean);const cover=normalizeImageValue(p.cover)||imgs[0]||'';return {...p,cover,images:imgs.length?imgs:(cover?[cover]:[]),category:p.category||'短袖',section:p.section||'常规款式',price:p.price||'¥129',size:p.size||'S / M / L / XL',condition:p.condition||p.material||'聚酯纤维速干运动面料'};}
async function loadProducts(){try{const res=await fetch(API_BASE+'/api/products?light=1',{cache:'no-store'});if(!res.ok)throw new Error('商品数据加载失败');const data=await res.json();products=(data.products||data||[]).map(normalizeProduct);renderGrid();}catch(err){$('grid').innerHTML='<div class="notice">商品数据加载失败：'+escapeHtml(err.message||String(err))+'</div>';}}
function productCard(p){return `<article class="card"><div class="media" onclick="openModal('${p.code}')">${p.cover?`<img loading="lazy" decoding="async" src="${p.cover}" alt="${escapeHtml(p.style)}">`:`<div class="placeholder">待上传真实图片</div>`}</div><div class="body"><div class="meta">${p.code}</div><h3 class="title">${p.style}</h3><div class="price">${p.price}</div><div class="specs"><div class="spec"><b>尺码</b><span>${p.size}</span></div><div class="spec"><b>颜色</b><span>${p.color||''}</span></div></div><div class="actions"><button class="btn primary" onclick="openModal('${p.code}')">查看详情</button><button class="btn" onclick="copyCode('${p.code}')">复制编号</button></div></div></article>`;}
function collectionBlock(title,list){const previewCount=title==='新品上新'?3:6;const preview=list.slice(0,previewCount);const meta=sectionMeta[title]||{subtitle:'查看该分区款式。'};return `<section class="collection ${title==='新品上新'?'new-section':''}"><div class="collection-head"><div><h3>${title}</h3><p>${meta.subtitle}</p></div><button class="section-link" onclick="openSection('${title}')">查看更多</button></div><div class="collection-grid">${preview.map(productCard).join('')}</div></section>`;}
function renderGrid(){const q=$('searchInput').value.trim().toLowerCase();let list=products.filter(p=>!currentSection||p.section===currentSection).filter(p=>!q||[p.code,p.style,p.color,p.size,p.price,p.condition,p.section,p.note].join(' ').toLowerCase().includes(q));const box=$('grid');if(!list.length){box.className='grid';box.innerHTML='<div class="notice">没有找到匹配款式。</div>';return;}if(currentSection||q){box.className='grid';box.innerHTML=list.map(productCard).join('');updateResultbar(list,q);return;}box.className='catalog-sections';box.innerHTML=sectionOrder.map(s=>{const l=list.filter(p=>p.section===s);return l.length?collectionBlock(s,l):'';}).join('');updateResultbar([],q);}
function updateResultbar(list,q){if(!currentSection&&!q){$('resultbar').classList.remove('show');$('resultbar').innerHTML='';return;}$('resultbar').classList.add('show');$('resultbar').innerHTML=`<span>当前正在查看：${currentSection||''}${q?' 搜索“'+escapeHtml(q)+'”':''} · 共 ${list.length} 款</span><button class="btn" onclick="goHome()">返回首页</button>`;}
function openSection(s){currentSection=s;$('searchInput').value='';renderGrid();window.scrollTo({top:0,behavior:'smooth'});}window.openSection=openSection;
function openModal(code){const p=products.find(x=>x.code===code);if(!p)return;currentProduct=p;currentImages=p.images&&p.images.length?p.images:[p.cover];currentImageIndex=0;$('modalCode').textContent=p.code;$('modalTitle').textContent=p.style;$('modalPrice').textContent=p.price;$('modalDesc').textContent=p.note||'暂无备注';$('details').innerHTML=[['价格',p.price],['尺码',p.size],['颜色',p.color||''],['分区',p.section],['材质',p.condition]].map(r=>`<div class="detail-row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');setMainImage(currentImages[0]);$('thumbs').innerHTML=currentImages.map((src,i)=>`<button class="thumb ${i===0?'active':''}" data-i="${i}"><img src="${src}" alt="图片${i+1}"></button>`).join('');document.querySelectorAll('.thumb').forEach(b=>b.onclick=()=>switchImage(Number(b.dataset.i)));$('modal').classList.add('open');document.body.style.overflow='hidden';}window.openModal=openModal;
function setMainImage(src){$('mainImgWrap').innerHTML=src?`<img src="${src}" alt="商品图片">`:'<div class="placeholder">待上传真实图片</div>';}
function switchImage(i){currentImageIndex=(i+currentImages.length)%currentImages.length;setMainImage(currentImages[currentImageIndex]);document.querySelectorAll('.thumb').forEach((b,j)=>b.classList.toggle('active',j===currentImageIndex));}
function closeModal(){$('modal').classList.remove('open');document.body.style.overflow='';}
function goHome(){currentSection=null;$('searchInput').value='';renderGrid();window.scrollTo({top:0,behavior:'smooth'});}window.goHome=goHome;
function copyCode(code){copyText(code)}window.copyCode=copyCode;
function infoText(p){return `【确认款式】\n编号：${p.code}\n款式：${p.style}\n颜色：${p.color||''}\n尺码：${p.size}\n价格：${p.price}\n材质：${p.condition}\n备注：${p.note||''}\n请联系店主确认库存。`;}
function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('已复制'),()=>showToast('复制失败，请手动复制'));}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
$('searchInput').addEventListener('input',renderGrid);$('homeBtn').onclick=goHome;$('backBtn').onclick=goHome;$('closeBtn').onclick=closeModal;$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});$('copyConfirm').onclick=()=>currentProduct&&copyText(infoText(currentProduct));$('copyCodeBtn').onclick=()=>currentProduct&&copyText(currentProduct.code);loadProducts();
</script>
</body>
</html>
